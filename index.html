<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENOTITAN 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple: #6A0DAD; --gold: #D4AF37; --silver: #A8A9AD;
            --bg: #020202; --active: var(--purple);
        }

        body {
            background: var(--bg); color: white; margin: 0; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Helvetica Neue', sans-serif; overflow: hidden;
            border: 15px solid var(--active); transition: border-color 0.8s ease;
        }

        #brand {
            position: absolute; top: 10%; font-family: 'Cinzel', serif;
            letter-spacing: 15px; font-size: 2.5rem; text-shadow: 0 0 15px var(--active);
            transition: text-shadow 0.8s ease;
        }

        #quote-box {
            max-width: 85%; text-align: center; padding: 20px;
            min-height: 250px; display: flex; flex-direction: column; justify-content: center;
        }

        #text {
            font-size: 1.8rem; font-weight: 300; line-height: 1.5;
            font-style: italic; margin-bottom: 20px; transition: opacity 0.4s;
        }

        #author {
            font-family: 'Space Mono', monospace; font-size: 0.8rem;
            letter-spacing: 4px; color: var(--active); text-transform: uppercase;
        }

        button {
            margin-top: 50px; background: none; border: 1px solid white;
            color: white; padding: 20px 40px; font-family: 'Space Mono', monospace;
            letter-spacing: 3px; cursor: pointer; transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active { transform: scale(0.95); background: white; color: black; }

        #counter {
            position: absolute; bottom: 5%; font-size: 0.6rem; 
            letter-spacing: 2px; opacity: 0.4;
        }
    </style>
</head>
<body>

    <div id="brand">ZENOTITAN</div>

    <div id="quote-box">
        <div id="text">Tap the button to begin your journey through the Discourses.</div>
        <div id="author">ZenoTitan Engine</div>
    </div>

    <button onclick="process()">NEXT REFLECTION</button>

    <div id="counter">REFLECTION <span id="num">0</span> / 200</div>

    <audio id="sfx" src="https://assets.mixkit.co/active_storage/sfx/2569/2569-preview.mp3"></audio>

    <script>
        // CORE QUOTE ARRAY (Populate to 200)
        const QUOTES = [
            {t: "The soul becomes dyed with the color of its thoughts.", a: "Marcus Aurelius"},
            {t: "He who fears death will never do anything worthy of a man who is alive.", a: "Seneca"},
            {t: "No man is free who is not master of himself.", a: "Epictetus"},
            {t: "It's not what happens to you, but how you react to it that matters.", a: "Epictetus"},
            {t: "Wealth consists not in having great possessions, but in having few wants.", a: "Epictetus"},
            {t: "If you want to improve, be content to be thought foolish and stupid.", a: "Epictetus"},
            {t: "Curb your desire—don't set your heart on so many things and you will get what you need.", a: "Epictetus"},
            {t: "We suffer more often in imagination than in reality.", a: "Seneca"},
            {t: "Difficulties are things that show what men are.", a: "Epictetus"},
            {t: "The key is to keep company only with people who uplift you.", a: "Epictetus"}
            // Add remaining 190 here...
        ];

        let seenIndices = JSON.parse(localStorage.getItem('zenoSeen')) || [];
        const colors = ['#6A0DAD', '#D4AF37', '#A8A9AD'];
        let colorIdx = 0;

        function process() {
            // Sound play
            const sfx = document.getElementById('sfx');
            sfx.currentTime = 0; sfx.play();

            // Reset if all 200 seen
            if (seenIndices.length >= QUOTES.length) {
                seenIndices = [];
                localStorage.setItem('zenoSeen', JSON.stringify([]));
            }

            // Find an unseen quote
            let randomIdx;
            do {
                randomIdx = Math.floor(Math.random() * QUOTES.length);
            } while (seenIndices.includes(randomIdx) && seenIndices.length < QUOTES.length);

            // Save state
            seenIndices.push(randomIdx);
            localStorage.setItem('zenoSeen', JSON.stringify(seenIndices));

            // UI Transitions
            const q = QUOTES[randomIdx];
            document.getElementById('text').style.opacity = 0;
            
            setTimeout(() => {
                document.getElementById('text').innerText = `"${q.t}"`;
                document.getElementById('author').innerText = q.a;
                document.getElementById('text').style.opacity = 1;
                document.getElementById('num').innerText = seenIndices.length;
            }, 300);

            // Color Logic
            colorIdx = (colorIdx + 1) % colors.length;
            document.documentElement.style.setProperty('--active', colors[colorIdx]);
        }
    </script>
</body>
</html>
