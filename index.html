<head>

    <title>ZENO TITAN | IMPERIAL v15</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gloss: linear-gradient(135deg, #fbf5b7 0%, #d4af37 25%, #fbf5b7 50%, #d4af37 75%, #fbf5b7 100%);
            --gold-text: #d4af37;
            --gold-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            --bg: #030303;
            --panel: rgba(15, 15, 15, 0.98);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: var(--gold-text);
            font-family: 'Space Mono', monospace; overflow-x: hidden;
        }

        /* Ambient Glossy Background */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #151515 0%, #030303 100%);
            z-index: -1;
        }

        header {
            padding: 30px; text-align: center; border-bottom: 2px solid var(--gold-text);
            background: #000; box-shadow: var(--gold-shadow); position: relative; z-index: 10;
        }

        .glimmer {
            font-family: 'Cinzel', serif; font-size: clamp(2.2rem, 8vw, 4.5rem); font-weight: 900;
            background: var(--gold-gloss); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 5s linear infinite; letter-spacing: 12px; margin: 0;
            filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.5));
        }
        @keyframes shine { to { background-position: 200% center; } }

        .container {
            max-width: 1200px; margin: 30px auto; padding: 20px;
            display: grid; grid-template-columns: 320px 1fr; gap: 30px;
        }

        /* Sidebar Navigation */
        .sidebar {
            background: var(--panel); border: 1px solid var(--gold-text);
            padding: 25px; border-radius: 4px; height: fit-content;
        }

        .btn-gold {
            background: var(--gold-gloss); color: #000; border: none;
            padding: 15px; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; width: 100%; letter-spacing: 2px; margin-bottom: 12px;
            text-transform: uppercase; transition: 0.3s; border-radius: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: var(--gold-shadow); }

        /* Main Content Stage */
        .main-deck {
            background: var(--panel); border: 1px solid var(--gold-text);
            padding: 40px; border-radius: 4px; box-shadow: 0 0 50px #000; min-height: 700px;
        }

        textarea {
            width: 100%; height: 120px; background: #000; border: 1px solid #333;
            color: #fff; padding: 20px; font-family: 'Space Mono'; font-size: 1.1rem;
            margin: 20px 0; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        textarea:focus { border-color: var(--gold-text); box-shadow: 0 0 10px var(--gold-shadow); }

        /* Output Displays */
        #response-area { display: none; margin-top: 30px; animation: fadeInUp 0.8s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .quote-box {
            font-family: 'Cinzel'; font-size: 2.2rem; color: #fff; line-height: 1.3;
            margin: 20px 0; border-left: 5px solid var(--gold-text); padding-left: 20px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
