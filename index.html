<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENOTITAN | Master Compendium</title>
    <style>
        :root {
            --gold: #FFD700;
            --purple: #BC13FE;
            --silver: #FFFFFF;
            --obsidian: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--obsidian);
            color: white;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }

        /* Metallic Border */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 4px solid transparent;
            background: linear-gradient(90deg, var(--gold), var(--purple), var(--silver), var(--gold)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: flow 5s linear infinite;
            z-index: 1000; /* Stays on top but ignored by clicks */
            pointer-events: none;
        }

        @keyframes flow {
            to { background-position: 400% center; }
        }

        .stage {
            text-align: center;
            max-width: 1000px;
            padding: 20px;
            z-index: 10;
            pointer-events: none; /* Allows clicks to pass through to body */
        }

        h1 {
            font-size: clamp(2.5rem, 11vw, 7.5rem);
            font-weight: 100;
            letter-spacing: 1.5rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            color: #fff;
            /* Sharp metallic highlights */
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8), 0 0 30px rgba(188, 19, 254, 0.4);
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-right: 1.5rem; /* Prevents N-clipping */
        }

        .subtitle {
            font-size: 0.75rem;
            letter-spacing: 7px;
            color: var(--silver);
            margin-bottom: 4rem;
            font-weight: 800;
            text-transform: uppercase;
        }

        #reflection-box {
            min-height: 300px;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #text {
            font-size: clamp(1.4rem, 3.5vw, 2.3rem);
            line-height: 1.3;
            font-weight: 800;
            margin-bottom: 30px;
            color: #fff;
        }

        #author {
            font-size: 1.1rem;
            letter-spacing: 10px;
            color: var(--gold);
            font-weight: 900;
            text-transform: uppercase;
        }

        #source {
            font-size: 0.8rem;
            color: var(--purple);
            margin-top: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .fade { opacity: 0; transform: scale(0.97); }
    </style>
</head>
<body>

        </div>
    </div>
