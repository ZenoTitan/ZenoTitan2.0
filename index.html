<head>

    <title>ZENOTITAN | The Complete 120</title>
    <style>
        :root {
            --gold: #FFD700;
            --silver: #FFFFFF;
            --purple: #BC13FE;
            --obsidian: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--obsidian);
            color: white;
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        /* Metallic Frame - Vibrant & Non-Blocking */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 4px solid transparent;
            background: linear-gradient(90deg, var(--gold), var(--purple), var(--silver), var(--gold)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: flow 4s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes flow {
            to { background-position: 400% center; }
        }

        .stage {
            text-align: center;
            width: 100%;
            max-width: 1200px;
            padding: 40px;
            z-index: 10;
            pointer-events: none;
        }

        h1 {
            font-size: clamp(2.5rem, 12vw, 7.5rem);
            font-weight: 100;
            letter-spacing: 1.4rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            color: #fff;
            filter: drop-shadow(0 0 12px rgba(255, 215, 0, 0.9));
            background: linear-gradient(to bottom, #FFFFFF 20%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            padding-right: 1.4rem; /* Fixes N clipping */
        }

        .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--silver);
            margin-bottom: 4rem;
            font-weight: 700;
        }

        #reflection-box {
            min-height: 280px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #text {
            font-size: clamp(1.5rem, 4vw, 2.4rem);
            line-height: 1.3;
            font-weight: 800;
            margin-bottom: 30px;
            color: #fff;
        }

        #author {
            font-size: 1.2rem;
            letter-spacing: 9px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
        }

        #source {
            font-size: 0.8rem;
            color: var(--purple);
            margin-top: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .fade { opacity: 0; transform: scale(0.98); }
    </style>
</head>
