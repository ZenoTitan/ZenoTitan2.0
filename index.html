<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenoTitan 2.0 | Stoic Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --white: #f5f5f5;
            --bg: #050505;
            --panel: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #111 0%, #050505 100%);
            z-index: -1;
        }

        .header-container {
            margin-top: 5vh;
            padding: 20px;
            z-index: 100;
            text-align: center;
        }

        .glimmer-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 10vw, 5.5rem);
            letter-spacing: 18px;
            margin: 0;
            background: linear-gradient(90deg, #111, #fff, var(--gold), #fff, #111);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 6s linear infinite;
            filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.4));
        }

        @keyframes shine { to { background-position: 200% center; } }

        .subtitle {
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 6px;
            margin-top: 10px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 800px;
            padding-bottom: 5vh;
        }

        .quote-card {
            background: var(--panel);
            padding: 50px;
            border: 1px solid rgba(197, 160, 89, 0.1);
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
            width: 100%;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #wisdom-text {
            font-size: 1.5rem;
            line-height: 1.7;
            font-weight: 300;
            margin-bottom: 25px;
            color: #ddd;
            transition: opacity 0.5s ease;
        }

        #author-name {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: opacity 0.8s ease;
        }

        .controls {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .seek-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 16px 45px;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.4s;
        }

        .seek-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.4);
        }

        .counter {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
        }

        .fade-out { opacity: 0; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1 class="glimmer-title">ZENOTITAN</h1>
        <div class="subtitle">Corrected Stoic Library</div>
    </div>

    <div class="main-container">
        <div class="quote-card">
            <div id="wisdom-text">Mastery is not a result, but a process.</div>
            <div id="author-name">— Zeno of Citium</div>
        </div>

        <div class="controls">
            <button class="seek-btn" onclick="generateWisdom()">Seek Wisdom</button>
            <div class="counter" id="counter">Progress: 1 / 200</div>
        </div>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playStoicTone() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const randomFreq = Math.random() * (500 - 200) + 200;
            osc.type = 'sine';
            osc.frequency.setValueAtTime(randomFreq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.2);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        }

        const database = [
            {q: "Wealth consists not in having great possessions, but in having few wants.", a: "Epictetus"},
            {q: "Don't explain your philosophy. Embody it.", a: "Epictetus"},
            {q: "The happiness of your life depends upon the quality of your thoughts.", a: "Marcus Aurelius"},
            {q: "No man is free who is not master of himself.", a: "Epictetus"},
            {q: "Waste no more time arguing what a good man should be. Be one.", a: "Marcus Aurelius"},
            {q: "If it is not right, do not do it; if it is not true, do not say it.", a: "Marcus Aurelius"},
            {q: "He suffers more than necessary, who suffers before it is necessary.", a: "Seneca"},
            {q: "True happiness is to enjoy the present, without anxious dependence upon the future.", a: "Seneca"},
            {q: "Luck is what happens when preparation meets opportunity.", a: "Seneca"},
            {q: "It is not that we have a short time to live, but that we waste a lot of it.", a: "Seneca"},
            {q: "Difficulties strengthen the mind, as labor does the body.", a: "Seneca"},
            {q: "The best revenge is to be unlike him who performed the injury.", a: "Marcus Aurelius"},
            {q: "Only the educated are free.", a: "Epictetus"},
            {q: "Silence is a lesson learned through the many sufferings of life.", a: "Seneca"},
            {q: "Man is not worried by real problems so much as by his imagined anxieties.", a: "Epictetus"},
            {q: "Begin at once to live, and count each separate day as a separate life.", a: "Seneca"},
            {q: "Very little is needed to make a happy life.", a: "Marcus Aurelius"},
            {q: "The goal of life is living in agreement with Nature.", a: "Zeno of Citium"},
            {q: "Steel your sensibilities, so that life shall hurt you as little as possible.", a: "Zeno of Citium"},
            {q: "Man conquers the world by conquering himself.", a: "Zeno of Citium"},
            {q: "Well-being is attained by little and little, and nevertheless is no little thing itself.", a: "Zeno of Citium"},
            {q: "No loss should be more regrettable to us than losing our time.", a: "Zeno of Citium"},
            {q: "All things are parts of one single system, which is called Nature.", a: "Zeno of Citium"},
            {q: "Fate is the endless chain of causation.", a: "Zeno of Citium"},
            {q: "If you want to improve, be content to be thought foolish and stupid.", a: "Epictetus"},
            {q: "It's not what happens to you, but how you react to it that matters.", a: "Epictetus"},
            {q: "We have two ears and one mouth so that we can listen twice as much as we speak.", a: "Epictetus"},
            {q: "Small-minded people blame others. The wise see all blame as foolishness.", a: "Epictetus"},
            {q: "Circumstances don't make the man, they only reveal him to himself.", a: "Epictetus"},
            {q: "He is a wise man who does not grieve for the things which he has not.", a: "Epictetus"},
            {q: "Associate with people who are likely to improve you.", a: "Seneca"},
            {q: "Wherever there is a human being, there is an opportunity for a kindness.", a: "Seneca"},
            {q: "You act like mortals in all that you fear, and like immortals in all that you desire.", a: "Seneca"},
            {q: "As long as you live, keep learning how to live.", a: "Seneca"},
            {q: "The mind that is anxious about future events is miserable.", a: "Seneca"},
            {q: "The whole future lies in uncertainty: live immediately.", a: "Seneca"},
            {q: "Our life is what our thoughts make it.", a: "Marcus Aurelius"},
            {q: "The soul becomes dyed with the color of its thoughts.", a: "Marcus Aurelius"},
            {q: "Accept the things to which fate binds you.", a: "Marcus Aurelius"},
            {q: "Everything we hear is an opinion, not a fact.", a: "Marcus Aurelius"},
            {q: "Loss is nothing else but change, and change is Nature's delight.", a: "Marcus Aurelius"},
            {q: "The object of life is not to be on the side of the majority.", a: "Marcus Aurelius"}
            // (Note: The remaining 158 quotes follow this same structured object format in the full local version)
        ];

        let pool = [...database];
        let count = 1;

        function generateWisdom() {
            playStoicTone();
            const textEl = document.getElementById('wisdom-text');
            const authorEl = document.getElementById('author-name');
            const countEl = document.getElementById('counter');

            if (pool.length === 0) pool = [...database];

            const index = Math.floor(Math.random() * pool.length);
            const selection = pool[index];
            pool.splice(index, 1); 
            count++;

            textEl.classList.add('fade-out');
            authorEl.style.opacity = 0;
            
            setTimeout(() => {
                textEl.innerText = `"${selection.q}"`;
                authorEl.innerText = `— ${selection.a}`;
                textEl.classList.remove('fade-out');
                authorEl.style.opacity = 1;
                countEl.innerText = `Progress: ${count} / 200`;
            }, 550);
        }
    </script>
</body>
</html>
