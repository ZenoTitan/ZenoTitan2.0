<!DOCTYPE html>
<html>
<head>
    <title>ZENO TITAN v6.3</title>
    <style>
        /* No hidden phases. Everything visible by default. */
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .titan-box { border: 2px solid #d4af37; max-width: 500px; margin: auto; padding: 40px; background: #0a0a0a; }
        h1 { color: #d4af37; letter-spacing: 10px; font-size: 3rem; }
        textarea { width: 100%; height: 100px; margin: 20px 0; background: #111; color: #fff; border: 1px solid #d4af37; }
        button { background: #d4af37; color: #000; padding: 15px 30px; border: none; font-weight: bold; cursor: pointer; width: 100%; }
        #result { margin-top: 30px; border-top: 1px solid #333; padding-top: 20px; display: none; }
    </style>
</head>
<body>

    <div class="titan-box">
        <h1>ZENO</h1>
        <p>TITAN COMMAND CENTER v6.3</p>
        <textarea id="chaosInput" placeholder="ENTER YOUR CHAOS..."></textarea>
        <button onclick="revealWisdom()">EXECUTE LOGIC</button>

        <div id="result">
            <h2 id="q" style="color: #d4af37;"></h2>
            <p id="a" style="font-style: italic;"></p>
            <button onclick="location.reload()" style="background:#222; color:#fff; margin-top:20px;">RESET</button>
        </div>
    </div>

    <script>
        function revealWisdom() {
            const quotes = [
                {q: "We suffer more in imagination than in reality.", a: "Seneca"},
                {q: "You have power over your mind - not outside events.", a: "Marcus Aurelius"}
            ];
            const pick = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('q').innerText = `"${pick.q}"`;
            document.getElementById('a').innerText = `- ${pick.a}`;
            document.getElementById('result').style.display = 'block';
        }
    </script>
</body>
</html>
