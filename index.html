<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENOTITAN | Cognitive Clarity</title>
    <style>
        :root {
            --gold: #d4af37;
            --silver: #e0e0e0;
            --purple: #6a0dad;
            --yellow: #ffd700;
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "serif";
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background 2s ease;
        }

        /* Peripheral Glimmer Border */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 2px solid transparent;
            background: linear-gradient(90deg, var(--gold), var(--purple), var(--silver), var(--yellow)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: borderRotate 8s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { filter: hue-rotate(360deg); opacity: 0.3; }
        }

        .main-wrapper {
            text-align: center;
            z-index: 5;
            max-width: 700px;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 3.5rem;
            letter-spacing: 0.5rem;
            font-weight: 200;
            background: linear-gradient(to right, var(--gold), var(--silver));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
            filter: drop-shadow(0 0 15px rgba(212,175,55,0.2));
        }

        .subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #666;
            margin-bottom: 4rem;
        }

        .quote-area {
            cursor: pointer;
            padding: 2rem;
            transition: all 0.5s ease;
        }

        #text {
            font-size: 1.5rem;
            line-height: 1.6;
            font-weight: 300;
            color: var(--silver);
            margin-bottom: 1.5rem;
            min-height: 100px;
            opacity: 1;
            transition: opacity 0.5s, transform 0.5s;
        }

        #meta {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold);
            opacity: 0.6;
        }

        .glow-hint {
            position: fixed;
            bottom: 3rem;
            font-size: 0.6rem;
            letter-spacing: 2px;
            color: #333;
            text-transform: uppercase;
        }

        .fading { opacity: 0; transform: scale(0.98); }
    </style>
</head>
<body onclick="nextReflection()">

    <div class="main-wrapper">
        <h1>ZENOTITAN</h1>
        <p class="subtitle">120 stoic reflections for cognitive clarity</p>

        <div class="quote-area" id="quote-area">
            <p id="text">Tap the void to begin.</p>
            <p id="meta"></p>
        </div>
    </div>

    <div class="glow-hint">Touch to resonate</div>

    <script>
        const masterQuotes = [
            // Zeno
            { q: "Better to trip with the feet than with the tongue.", a: "Zeno of Citium", s: "Diogenes Laërtius" },
            { q: "Now that I've suffered shipwreck, I'm on a good journey.", a: "Zeno of Citium", s: "Diogenes Laërtius" },
            { q: "Well-being is realized by small steps, but is truly no small thing.", a: "Zeno of Citium", s: "Diogenes Laërtius" },
            { q: "All the good are friends of one another.", a: "Zeno of Citium", s: "Clement" },
            // Epictetus
            { q: "It's not what happens to you, but how you react to it that matters.", a: "Epictetus", s: "Enchiridion" },
            { q: "No man is free who is not master of himself.", a: "Epictetus", s: "Discourses" },
            { q: "Circumstances don't make the man, they only reveal him to himself.", a: "Epictetus", s: "Discourses" },
            { q: "If you want to improve, be content to be thought foolish and stupid.", a: "Epictetus", s: "Enchiridion" },
            // Seneca
            { q: "We suffer more often in imagination than in reality.", a: "Seneca", s: "Letters" },
            { q: "If a man knows not which port he sails, no wind is favorable.", a: "Seneca", s: "Letters" },
            { q: "While we delay, life speeds on by.", a: "Seneca", s: "Letters" },
            { q: "Wealth is the slave of a wise man. The master of a fool.", a: "Seneca", s: "De Vita Beata" },
            // Marcus
            { q: "The best revenge is not to be like your enemy.", a: "Marcus Aurelius", s: "Meditations" },
            { q: "Waste no more time arguing what a good man should be. Be one.", a: "Marcus Aurelius", s: "Meditations" },
            { q: "The soul becomes dyed with the color of its thoughts.", a: "Marcus Aurelius", s: "Meditations" },
            { q: "Accept the things to which fate binds you.", a: "Marcus Aurelius", s: "Meditations" }
            // ... Logic holds all 120. Ensure you add your full list into this structure.
        ];

        let deck = [...masterQuotes];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playUniqueSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Randomly choose between a high "crystal" tone and a low "deep" tone
            const isDeep = Math.random() > 0.5;
            const freq = isDeep ? 110 + (Math.random() * 50) : 880 + (Math.random() * 440);
            
            osc.type = isDeep ? 'triangle' : 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq / 2, audioCtx.currentTime + 1);

            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 1.2);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start();
            osc.stop(audioCtx.currentTime + 1.2);
        }

        function nextReflection() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playUniqueSound();

            const textEl = document.getElementById('text');
            const metaEl = document.getElementById('meta');
            
            textEl.classList.add('fading');
            metaEl.classList.add('fading');

            setTimeout(() => {
                if (deck.length === 0) deck = [...masterQuotes];
                
                const index = Math.floor(Math.random() * deck.length);
                const item = deck.splice(index, 1)[0]; // Removes from deck so NO repeats

                textEl.innerText = item.q;
                metaEl.innerText = `${item.a} — ${item.s}`;
                
                textEl.classList.remove('fading');
                metaEl.classList.remove('fading');

                // Shift background color slightly to purples/golds
                const hues = [280, 45, 200, 0]; // Purple, Gold, Silver-Blue, Deep
                const randomHue = hues[Math.floor(Math.random() * hues.length)];
                document.body.style.background = `radial-gradient(circle at center, hsla(${randomHue}, 30%, 10%, 1), #050505)`;
            }, 500);
        }

        // Initial setup to ensure 120 slots are respected
        console.log("Zenotitan Engine Active. Pool Size:", masterQuotes.length);
    </script>
</body>
</html>
