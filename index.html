<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENO TITAN | NEXUS v18</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-gloss: linear-gradient(135deg, #cfc09f 0%, #634f2c 25%, #cfc09f 50%, #f3e5ab 75%, #cfc09f 100%);
            --bg: #020202;
            --glass: rgba(12, 12, 12, 0.98);
            --border: rgba(212, 175, 55, 0.25);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: var(--gold);
            font-family: 'Space Mono', monospace; scroll-behavior: smooth; overflow-x: hidden;
        }

        /* LIQUID GOLD HEADER */
        header {
            padding: 40px; text-align: center; background: #000;
            border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
        }

        .glimmer {
            font-family: 'Cinzel', serif; font-size: clamp(2rem, 6vw, 3.5rem); font-weight: 900;
            background: var(--gold-gloss); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 6s linear infinite; letter-spacing: 12px; margin: 0;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
        }
        @keyframes shine { to { background-position: 200% center; } }

        .layout {
            max-width: 1400px; margin: 40px auto; display: grid;
            grid-template-columns: 320px 1fr; gap: 30px; padding: 0 20px;
        }

        .sidebar {
            background: var(--glass); border: 1px solid var(--border);
            padding: 30px; border-radius: 2px; height: fit-content; position: sticky; top: 160px;
        }

        .nav-btn {
            background: var(--gold-gloss); color: #000; border: none;
            padding: 18px; width: 100%; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; letter-spacing: 3px; margin-bottom: 15px;
            text-transform: uppercase; transition: 0.3s; box-shadow: 0 5px 15px #000;
        }
        .nav-btn:hover { transform: translateY(-3px); box-shadow: 0 0 25px rgba(212,175,55,0.4); }

        .content-pane {
            background: var(--glass); border: 1px solid var(--border);
            padding: 50px; border-radius: 2px; box-shadow: 0 0 60px #000; min-height: 750px;
        }

        .view { display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* CHAT INTERFACE */
        .chat-wall {
            height: 500px; overflow-y: auto; background: #000; border: 1px solid #1a1a1a;
            padding: 25px; margin-bottom: 25px; display: flex; flex-direction: column; gap: 20px;
        }
        .msg { padding: 15px 22px; border-radius: 2px; max-width: 85%; line-height: 1.7; font-size: 0.95rem; }
        .user-msg { align-self: flex-end; background: var(--gold); color: #000; font-weight: bold; }
        .ai-msg { align-self: flex-start; background: #0c0c0c; border-left: 3px solid var(--gold); color: #fff; }

        .input-row { display: flex; gap: 15px; }
        input[type="text"] {
            flex: 1; background: #000; border: 1px solid #333; color: #fff;
            padding: 20px; font-family: 'Space Mono'; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--gold); }

        /* VAULT GRID */
        .vault-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px; margin-top: 30px;
        }
        .quote-card { background: #080808; border: 1px solid #1a1a1a; padding: 30px; transition: 0.4s; }
        .quote-card:hover { border-color: var(--gold); transform: translateY(-5px); }
        .quote-card b { font-family: 'Cinzel'; display: block; margin-bottom: 12px; color: #fff; letter-spacing: 2px; border-bottom: 1px solid #222; padding-bottom: 8px; font-size: 0.7rem; }
        .quote-card p { font-size: 0.95rem; color: #bbb; margin: 0; line-height: 1.7; }

        /* VIRTUE LAB */
        .virtue-box { border-left: 4px solid var(--gold); background: #050505; padding: 25px; margin-bottom: 25px; }
        .virtue-box h4 { font-family: 'Orbitron'; margin: 0 0 12px 0; letter-spacing: 4px; color: #fff; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <h1 class="glimmer">ZENO TITAN</h1>
    <div style="font-size: 0.75rem; letter-spacing: 12px; opacity: 0.5; margin-top: 10px;">SOVEREIGNTY NEXUS v18.0</div>
</header>

<div class="layout">
    <div class="sidebar">
        <button class="nav-btn" onclick="showView('oracle')">The Oracle</button>
        <button class="nav-btn" onclick="showView('vault')">The Archive</button>
        <button class="nav-btn" onclick="showView('virtues')">Virtue Logic</button>
        <button class="nav-btn" onclick="location.reload()" style="background: #111; color: var(--gold); font-size: 0.6rem;">REBOOT_NEXUS</button>
    </div>

    <div class="content-pane">
        <div id="oracle" class="view active">
            <h2 style="font-family: 'Cinzel'; letter-spacing: 6px;">COMMUNE WITH THE TITAN</h2>
            <p>A CBT-Logic Stoic Intelligence. Describe your chaos; it will dismantle the illusion of stress.</p>
            <div class="chat-wall" id="chatWall">
                <div class="msg ai-msg">The Nexus is synchronized. Speak your truth, and we shall apply the steel of logic to your feelings.</div>
            </div>
            <div class="input-row">
                <input type="text" id="chatIn" placeholder="I am struggling with..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="nav-btn"
