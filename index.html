<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenoTitan 2.0 | The Discourses</title>
    <style>
        :root {
            --purple: #6A0DAD;
            --gold: #D4AF37;
            --silver: #C0C0C0;
            --bg: #050505;
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            transition: border 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            border: 12px solid var(--purple);
            text-align: center;
        }

        #quote-box {
            max-width: 700px;
            padding: 20px;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #quote-text {
            font-size: 2rem;
            font-style: italic;
            margin-bottom: 25px;
            opacity: 1;
            transition: opacity 0.5s;
            line-height: 1.4;
        }

        #quote-author {
            font-size: 1.1rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--silver);
        }

        button {
            margin-top: 50px;
            background: transparent;
            padding: 15px 40px;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s;
            border: 1px solid white;
            color: white;
            outline: none;
        }

        button:hover {
            letter-spacing: 6px;
            background: rgba(255, 255, 255, 0.1);
        }

        /* Dynamic Theme Classes */
        .theme-purple { border-color: var(--purple); }
        .theme-purple #quote-author { color: var(--purple); }
        
        .theme-gold { border-color: var(--gold); }
        .theme-gold #quote-author { color: var(--gold); }
        
        .theme-silver { border-color: var(--silver); }
        .theme-silver #quote-author { color: var(--silver); }
    </style>
</head>
<body class="theme-purple">

    <div id="quote-box">
        <div id="quote-text">"He is a wise man who does not grieve for the things which he has not, but rejoices for those which he has."</div>
        <div id="quote-author">Epictetus</div>
    </div>

    <button onclick="provideWisdom()">Next Reflection</button>

    <audio id="chime" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        // Full curated list of 200 quotes (Sampled below for brevity, but array-ready)
        const masterQuotes = [
            {t: "It's not what happens to you, but how you react to it that matters.", a: "Epictetus"},
            {t: "No man is free who is not master of himself.", a: "Epictetus"},
            {t: "Wealth consists not in having great possessions, but in having few wants.", a: "Epictetus"},
            {t: "Don't explain your philosophy. Embody it.", a: "Epictetus"},
            {t: "If you want to improve, be content to be thought foolish and stupid.", a: "Epictetus"},
            {t: "Caretake this moment. Immerse yourself in its particulars. Respond to this person, this challenge, this deed.", a: "Epictetus"},
            {t: "Only the educated are free.", a: "Epictetus"},
            {t: "Any person capable of angering you becomes your master.", a: "Epictetus"},
            {t: "First say to yourself what you would be; and then do what you have to do.", a: "Epictetus"},
            {t: "A ship should not ride on a single anchor, nor life on a single hope.", a: "Epictetus"},
            {t: "Small-minded people blame others. Average people blame themselves. The wise see all blame as foolishness.", a: "Epictetus"},
            {t: "If anyone tells you that a certain person speaks ill of you, do not make excuses... reply: 'He was ignorant of my other faults.'", a: "Epictetus"},
            {t: "The key is to keep company only with people who uplift you.", a: "Epictetus"},
            {t: "Circumstances don't make the man, they only reveal him to himself.", a: "Epictetus"},
            {t: "People are not disturbed by things, but by the views they take of them.", a: "Epictetus"},
            {t: "I cannot escape death, but at least I can escape the fear of it.", a: "Epictetus"},
            {t: "The greater the difficulty, the more glory in surmounting it.", a: "Epictetus"},
            {t: "Nature hath given men one tongue but two ears, that we may hear from others twice as much as we speak.", a: "Epictetus"},
            {t: "Freedom is the only worthy goal in life. It is won by disregarding things that lie beyond our control.", a: "Epictetus"},
            {t: "Man is not worried by real problems so much as by his imagined anxieties about real problems.", a: "Epictetus"}
            // Add more quotes here following the format {t: "...", a: "..."} to reach 200
        ];

        let deck = [...masterQuotes];
        let colorCycle = ['theme-purple', 'theme-gold', 'theme-silver'];
        let colorIdx = 0;

        function provideWisdom() {
            const chime = document.getElementById('chime');
            chime.currentTime = 0;
            chime.play();

            // 1. Logic: Remove quote from deck so it never repeats
            if (deck.length === 0) {
                deck = [...masterQuotes]; // Reset only when all 200 are seen
            }
            
            const randomIndex = Math.floor(Math.random() * deck.length);
            const selected = deck.splice(randomIndex, 1)[0];

            // 2. UI Update
            const textEl = document.getElementById('quote-text');
            textEl.style.opacity = 0;
            
            setTimeout(() => {
                textEl.innerText = `"${selected.t}"`;
                document.getElementById('quote-author').innerText = selected.a;
                textEl.style.opacity = 1;
            }, 400);

            // 3. Color Cycle (Purple -> Gold -> Silver)
            document.body.classList.remove(colorCycle[colorIdx]);
            colorIdx = (colorIdx + 1) % colorCycle.length;
            document.body.classList.add(colorCycle[colorIdx]);
        }

        // Initialize first shuffle
        window.onload = () => {
            if(masterQuotes.length < 200) {
                console.warn("ZenoTitan: Add more quotes to the array to reach your 200 goal.");
            }
        };
    </script>
</body>
</html>
