<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENO | TITAN</title>
    <style>
        :root {
            --silver: linear-gradient(90deg, #757575, #e0e0e0, #757575);
            --gold: #FFD700;
            --purple: #2e004f;
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: #f0f0f0;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            overflow: hidden;
            transition: background 1.5s cubic-bezier(0.19, 1, 0.22, 1);
            /* The Silver Bar around the screen */
            border: 8px solid;
            border-image: linear-gradient(to bottom, #bdc3c7, #2c3e50, #bdc3c7) 1;
        }

        /* Hero Text */
        .brand { text-align: center; position: absolute; top: 10%; pointer-events: none; }
        h1 { 
            font-family: 'Times New Roman', serif; font-size: clamp(3rem, 15vw, 7rem); 
            letter-spacing: 2rem; color: #fff; font-weight: 200; line-height: 1;
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .titan { font-size: 0.7rem; letter-spacing: 1.2rem; color: #888; text-transform: uppercase; margin-top: 10px; }

        /* Interaction Zone */
        main { 
            width: 85%; max-width: 650px; text-align: center; 
            cursor: pointer; z-index: 10;
        }

        #q-text { 
            font-size: clamp(1.2rem, 5vw, 2.2rem); line-height: 1.6; 
            font-weight: 300; font-style: italic; margin-bottom: 2rem; 
            transition: opacity 0.4s ease;
        }
        #q-author { 
            font-size: 0.8rem; letter-spacing: 5px; color: var(--gold); 
            text-transform: uppercase; opacity: 0.8;
        }

        /* UI State */
        .fade { opacity: 0; transform: translateY(10px); }
        #progress { 
            position: absolute; bottom: 5%; font-size: 0.6rem; 
            letter-spacing: 3px; color: #444; text-transform: uppercase;
        }
    </style>
</head>
<body id="core">

    <div class="brand">
        <h1>ZENO</h1>
        <div class="titan">TITAN</div>
    </div>

    <main id="trigger">
        <p id="q-text">TAP TO AWAKEN</p>

    </main>

            {q: "Waste no more time arguing.", a: "Marcus Aurelius"},
            {q: "Fortune bids me follow philosophy.", a: "Zeno of Citium"},
            {q: "Life in accordance with nature.", a: "Zeno of Citium"},
            {q: "A gift consists of the intention.", a: "Seneca"},
            {q: "He who is brave is free.", a: "Seneca"},

        const app = {
            audio: null,
            deck: [],
            
            init() {
                this.loadDeck();
                document.getElementById('trigger').addEventListener('click', () => this.resonate());
                document.body.addEventListener('click', () => {
                    if (!this.audio) this.audio = new (window.AudioContext || window.webkitAudioContext)();
                });
            },

            loadDeck() {
                const saved = JSON.parse(localStorage.getItem('zeno_deck') || '[]');
                if (saved.length === 0) {
                    this.deck = this.shuffle([...MASTER_VAULT]);
                    this.save();
                } else {
                    this.deck = saved;
                }
                this.updateCounter();
            },

            shuffle(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            },

            save() {
                localStorage.setItem('zeno_deck', JSON.stringify(this.deck));
            },

            updateCounter() {
                document.getElementById('count').innerText = this.deck.length;
            },

            playBell() {
                if (!this.audio) return;
                const now = this.audio.currentTime;
                const osc = this.audio.createOscillator();
                const gain = this.audio.createGain();
                
                // Random addictive frequency shift
                const freqs = [440, 554.37, 659.25, 880, 329.63];
                osc.frequency.setValueAtTime(freqs[Math.floor(Math.random()*freqs.length)], now);
                osc.type = 'sine';

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.2, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 1.5);

                osc.connect(gain).connect(this.audio.destination);
                osc.start();
                osc.stop(now + 1.5);
            },

            resonate() {
                if (this.deck.length === 0) {
                    this.deck = this.shuffle([...MASTER_VAULT]);
                }

                this.playBell();
                const text = document.getElementById('q-text');
                const auth = document.getElementById('q-author');
                const core = document.getElementById('core');

                text.classList.add('fade');
                
                setTimeout(() => {
                    const pick = this.deck.pop();
                    text.innerText = pick.q;
                    auth.innerText = pick.a;
                    
                    // Dynamic Aesthetic Shifts
                    const hues = ['#050505', '#1a002e', '#001a1a', '#1a1a00'];
                    core.style.backgroundColor = hues[Math.floor(Math.random()*hues.length)];
                    
                    text.classList.remove('fade');
                    this.save();
                    this.updateCounter();
                }, 300);
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
