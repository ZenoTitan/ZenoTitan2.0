<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENO | Deep Agent v7.0</title>
    <style>
        :root {
            --bg: #040605;
            --sage: #94b4a4;
            --forest: #1a241f;
            --gold: #d4af37;
            --mist: #e0e6e3;
            --transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg);
            color: var(--mist);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh; overflow: hidden;
            display: flex; flex-direction: column;
            background-image: radial-gradient(circle at 50% 120%, var(--forest) 0%, var(--bg) 80%);
        }
        header { padding: 4rem 0 1rem; text-align: center; }
        h1 { 
            font-family: 'Times New Roman', serif; font-size: clamp(2.5rem, 10vw, 4.5rem); 
            letter-spacing: 1.2rem; color: var(--sage); font-weight: 200;
        }
        .state-indicator { font-size: 0.6rem; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; margin-top: 0.5rem; }

        main { flex-grow: 1; position: relative; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .view { display: none; width: 100%; max-width: 650px; flex-direction: column; animation: fadeIn 0.8s ease forwards; }
        .view.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Chat Architecture */
        #chat-log { height: 350px; overflow-y: auto; margin-bottom: 2rem; scrollbar-width: none; display: flex; flex-direction: column; gap: 1rem; }
        #chat-log::-webkit-scrollbar { display: none; }
        .msg { padding: 1.2rem; border-radius: 4px; font-size: 0.95rem; line-height: 1.7; max-width: 88%; transition: var(--transition); }
        .msg.ai { background: rgba(148, 180, 164, 0.04); color: var(--sage); border-left: 1px solid var(--sage); align-self: flex-start; }
        .msg.user { background: rgba(212, 175, 55, 0.04); color: var(--mist); border-right: 1px solid var(--gold); align-self: flex-end; text-align: right; }

        .input-wrap { border-bottom: 1px solid var(--forest); padding: 12px 0; }
        input { background: transparent; border: none; outline: none; color: var(--mist); width: 100%; font-size: 1.1rem; font-weight: 300; }

        /* Doxastic Choice UI */
        .path-grid { display: grid; gap: 10px; margin-top: 1rem; }
        .path-option { 
            padding: 1.5rem; background: rgba(255,255,255,0.02); border: 1px solid rgba(148, 180, 164, 0.1);
            cursor: pointer; transition: var(--transition); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px;
        }
        .path-option:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        nav { padding: 2rem; display: flex; justify-content: center; gap: 3rem; background: rgba(0,0,0,0.2); }
        .nav-link { font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--mist); opacity: 0.4; cursor: pointer; }
        .nav-link.active { opacity: 1; color: var(--sage); border-bottom: 1px solid var(--sage); }
    </style>
</head>
<body>

<header>
    <h1>ZENO</h1>
    <div id="state-tag" class="state-indicator">Awaiting Input</div>
</header>

<main>
    <div id="view-reflect" class="view active">
        <div id="quote-card" style="text-align: center; cursor: pointer;">
            <p id="q-text" style="font-size: 1.6rem; font-style: italic; font-weight: 300; line-height: 1.8;">Tap to enter the Citadel.</p>
            <p id="q-author" style="color: var(--gold); margin-top: 1.5rem; letter-spacing: 5px; font-size: 0.7rem;">INITIATE</p>
        </div>
    </div>

    <div id="view-ai" class="view">
        <div id="chat-log">
            <div class="msg ai">The mind is currently clear. What impression enters your field of awareness?</div>
        </div>
        <div class="input-wrap">
            <input type="text" id="agent-input" placeholder="Describe the impression..." autocomplete="off">
        </div>
    </div>

    <div id="view-delib" class="view">
        <p style="text-align: center; font-size: 0.8rem; color: var(--sage); margin-bottom: 2rem; letter-spacing: 3px;">DELIBERATION: OPEN PATHS DETECTED</p>
        <div class="path-grid" id="path-container"></div>
    </div>
</main>

<nav>
    <div class="nav-link active" data-v="reflect">Reflect</div>
    <div class="nav-link" data-v="ai">Counselor</div>
    <div class="nav-link" data-v="delib">Deliberate</div>
</nav>

<script>
// VECTOR-LIKE RESPONSE LIBRARY
const LESSONS = {
    CRISIS: [
        "This intensity is a physical storm. Your reason is the anchor. Is the storm inside you, or are you the sky holding the storm?",
        "Pain is unavoidable, but suffering is the story you tell yourself about the pain. Strip the story away. What remains?",
        "In this moment, the universe is exactly as it must be. Resistance is the only source of your distress."
    ],
    REFLECTION: [
        "You are observing your thoughts as if they belong to another. This is the first step toward freedom.",
        "Character is not built in peace. It is carved in the quiet moments of honest self-reflection.",
        "Wealth, health, and status are 'indifferents.' They are the tools, not the master. Are you using them, or are they using you?"
    ],
    DECISION: [
        "According to Tomis Kapitan, deliberation is only possible if you believe multiple paths are open. Which path aligns with Virtue?",
        "Action without intention is merely movement. What is the 'Why' behind the 'What'?",
        "The future is a ghost. Your choice exists only in the razor's edge of the present."
    ]
};

const app = {
    state: 'REFLECTION',
    history: [],
    seen: new Set(),
    audio: null,

    init() {
        document.querySelectorAll('.nav-link').forEach(l => l.onclick = (e) => this.switchView(e.target));
        document.getElementById('quote-card').onclick = () => this.nextQuote();
        document.getElementById('agent-input').onkeypress = (e) => { if(e.key === 'Enter') this.processInput(e.target.value); };
        console.log("ZENO 7.0 Deep Agent Active.");
    },

    switchView(target) {
        const v = target.dataset.v;
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        document.getElementById(`view-${v}`).classList.add('active');
        target.classList.add('active');
        if(v === 'delib') this.renderPaths();
    },

    // ADVANCED SENTIMENT ANALYSIS
    processInput(val) {
        if(!val.trim()) return;
        this.addMsg('user', val);
        document.getElementById('agent-input').value = '';
        
        // Sentiment Scoring Logic
        const crisisWords = ['help', 'hurt', 'pain', 'stress', 'die', 'angry', 'hate', 'fear'];
        const decisionWords = ['choice', 'decide', 'do', 'should', 'action', 'future', 'pick'];
        
        const lower = val.toLowerCase();
        let newState = 'REFLECTION';
        
        if(crisisWords.some(w => lower.includes(w))) newState = 'CRISIS';
        else if(decisionWords.some(w => lower.includes(w))) newState = 'DECISION';

        this.updateState(newState);

        // Simulation of "Neural" Thinking
        setTimeout(() => {
            const pool = LESSONS[this.state];
            const response = pool[Math.floor(Math.random() * pool.length)];
            this.addMsg('ai', response);
            this.history.push({u: val, ai: response, state: newState});
        }, 900);
    },

    updateState(s) {
        this.state = s;
        document.getElementById('state-tag').innerText = `Current State: ${s}`;
        document.getElementById('state-tag').style.color = s === 'CRISIS' ? '#ff6b6b' : 'var(--gold)';
    },

    addMsg(role, text) {
        const log = document.getElementById('chat-log');
        const d = document.createElement('div');
        d.className = `msg ${role}`;
        d.innerText = text;
        log.appendChild(d);
        log.scrollTop = log.scrollHeight;
    },

    renderPaths() {
        const container = document.getElementById('path-container');
        container.innerHTML = '';
        const paths = [
            {t: "The Path of Acceptance", s: "Amor Fati"},
            {t: "The Path of Action", s: "Virt
