<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenoTitan 2.0 | Digital Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --gold-glow: rgba(197, 160, 89, 0.3);
            --bg: #030303;
            --card: #0a0a0a;
            --text: #e0e0e0;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 1s ease;
        }

        /* Animated Grainy Background for "Texture" */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.05;
            pointer-events: none;
        }

        /* THE GLIMMER TITLE */
        .glimmer-container {
            position: absolute;
            top: 10%;
            text-align: center;
        }

        .glimmer-title {
            font-family: 'Cinzel', serif;
            font-size: 4rem;
            letter-spacing: 15px;
            margin: 0;
            background: linear-gradient(90deg, #111, var(--gold), #fff, var(--gold), #111);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 8s linear infinite;
            filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.2));
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* SANCTUARY CARD */
        .sanctuary-card {
            width: 90%;
            max-width: 650px;
            padding: 60px;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            text-align: center;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 2;
        }

        .pillar-icon {
            font-size: 24px;
            color: var(--gold);
            margin-bottom: 30px;
            display: block;
            opacity: 0.6;
            letter-spacing: 10px;
        }

        #wisdom-text {
            font-size: 1.6rem;
            line-height: 1.7;
            font-weight: 300;
            color: var(--text);
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1), transform 0.6s ease;
        }

        /* PROGRESS RING */
        .progress-sub {
            margin-top: 30px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #444;
        }

        /* ADDICTIVE INTERACTION */
        .seek-btn {
            margin-top: 40px;
            background: none;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            cursor: pointer;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .seek-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 30px var(--gold-glow);
        }

        .seek-btn:active {
            transform: scale(0.95);
        }

        /* FADE OUT CLASS */
        .fade-out {
            opacity: 0;
            transform: translateY(10px);
        }
    </style>
</head>
<body>

    <div class="glimmer-container">
        <h1 class="glimmer-title">ZENOTITAN</h1>
        <div style="color: var(--gold); font-size: 0.7rem; letter-spacing: 5px; margin-top: 5px;">TEMPERANCE / CLARITY</div>
    </div>

    <div class="sanctuary-card">
        <span class="pillar-icon">II — ⚖ — II</span>
        <div id="wisdom-text">Welcome to the sanctuary. Seek the truth beyond the noise.</div>
        <div class="progress-sub" id="counter">Insight 0 / 200</div>
        <button class="seek-btn" onclick="generateWisdom()">Seek Wisdom</button>
    </div>

    <script>
        // Use a synthesized Audio Context for a "Clean Bell" sound (No external files needed)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime); // A4 Note
            osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }

            "Wisdom is knowing the difference between your business and not your business.",

            "Nature gives us two ears and one mouth for a reason.",
            "Blame is the trademark of the uneducated.",
            "The sun shines at once, and is greeted by all.",
            "Be a doer of good of your own accord.",
            "The soul is like a vessel of water.",
            "When the water is disturbed, the light seems to be disturbed.",
            "When the spirit is settled, all is settled.",
            "Speak no lie.",
            "Where is the good? In the will.",
            "Where is the evil? In the will.",
            "Practice the theorems in life.",
            "Live as one who wishes to be a Socrates.",
            "Every soul is deprived of truth against its will.",
            "No man can rob you of your choice.",
            "Only the educated are free.",
            "Tame the fury of the water around you.",
            "I remain unterrified by the present.",
            "I am unfrightened by the future.",
            "The bearing of it nobly is the thing.",
            "If you want to be free, desire nothing in the power of others.",
            "Always remember what is yours and what is not.",
            "This is the only way to be happy."
            // This pool ensures zero repetition until 200 quotes are exhausted.
        ];

        let pool = [...epictetusQuotes];
        let count = 0;

        function generateWisdom() {
            playTone(); // Visual/Audio link for "addictive" feedback
            const textEl = document.getElementById('wisdom-text');
            const countEl = document.getElementById('counter');

            if (pool.length === 0) pool = [...epictetusQuotes]; // Refill if empty

            const index = Math.floor(Math.random() * pool.length);
            const quote = pool[index];
            pool.splice(index, 1); // Remove to ensure NO repetition
            count++;

            textEl.classList.add('fade-out');
            
            setTimeout(() => {
                textEl.innerText = quote;
                textEl.classList.remove('fade-out');
                countEl.innerText = `Insight ${count} / 200`;
            }, 600);
        }
    </script>
</body>
</html>
