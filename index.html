<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENO | TITAN 2.0</title>
    <style>
        :root {
            --bg: #050505;
            --zeno-gold: #c5a059;
            --titan-silver: rgba(255, 255, 255, 0.3);
            --accent-purple: #4a306d;
            --text-main: #f0f0f0;
            --transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        /* Refined Metallic Frame */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            border: 1px solid rgba(197, 160, 89, 0.2);
            pointer-events: none;
            z-index: 100;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 800px;
            z-index: 10;
            animation: breathe 10s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-5px) scale(1.01); }
        }

        /* Branding */
        .brand-group { margin-bottom: 4rem; }

        h1 {
            font-family: 'Times New Roman', serif;
            font-size: clamp(4rem, 18vw, 9rem);
            font-weight: 200;
            letter-spacing: 2rem;
            text-transform: uppercase;
            background: linear-gradient(180deg, #fff 0%, var(--zeno-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.2));
            line-height: 0.9;
            padding-left: 2rem; /* Balance for letter-spacing */
        }

        .titan-sub {
            font-size: 0.7rem;
            letter-spacing: 0.8rem;
            color: var(--titan-silver);
            text-transform: uppercase;
            font-weight: 400;
            margin-top: 0.5rem;
        }

        /* Modules */
        #reflection-stage, #doxastic-stage {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: var(--transition);
        }

        #doxastic-stage { display: none; }

        #text {
            font-size: clamp(1.1rem, 4vw, 1.8rem);
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 2rem;
            color: #fff;
            font-style: italic;
        }

        .meta-text {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: var(--zeno-gold);
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Doxastic Interactive Elements */
        .path-option {
            padding: 1.5rem;
            margin: 0.5rem 0;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2px;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .path-option:hover {
            background: rgba(197, 160, 89, 0.05);
            border-color: var(--zeno-gold);
            transform: scale(1.02);
        }

        /* Production Grade Navigation */
        .app-nav {
            position: fixed;
            bottom: 40px;
            display: flex;
            gap: 3rem;
            z-index: 200;
        }

        .nav-btn {
            background: none;
            border: none;
            color: var(--titan-silver);
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            padding-bottom: 8px;
            border-bottom: 1px solid transparent;
            transition: var(--transition);
        }

        .nav-btn.active {
            color: var(--zeno-gold);
            border-bottom: 1px solid var(--zeno-gold);
        }

        .fade { opacity: 0; transform: translateY(10px); }

        @media (max-width: 600px) {
            h1 { letter-spacing: 1rem; padding-left: 1rem; }
            .app-nav { gap: 1.5rem; bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand-group">
            <h1>ZENO</h1>
            <div class="titan-sub">TITAN 2.0</div>
        </div>

        <div id="reflection-stage">
            <p id="text">THE OBSIDIAN DECK IS READY.</p>
            <p id="author" class="meta-text">TAP TO INITIATE</p>
        </div>

        <div id="doxastic-stage">
            <p class="meta-text" style="margin-bottom: 2rem;">Deliberation: Choose an open path</p>
            <div class="path-option" onclick="app.deliberate('REASON')">I act upon reason</div>
            <div class="path-option" onclick="app.deliberate('OBSERVATION')">I observe the impulse</div>
            <div class="path-option" onclick="app.deliberate('SILENCE')">I choose the silent path</div>
        </div>
    </div>

    <nav class="app-nav">
        <button id="btn-reflect" class="nav-btn active" onclick="app.setView('reflect')">Reflect</button>
        <button id="btn-doxastic" class="nav-btn" onclick="app.setView('doxastic')">Deliberate</button>
    </nav>

    <script>
        const masterQuotes = [
            {q: "Better to trip with the feet than with the tongue.", a: "Zeno of Citium"},
            {q: "We have two ears and one mouth, so we should listen more than we say.", a: "Zeno of Citium"},
            {q: "Now that I've suffered shipwreck, I'm on a good journey.", a: "Zeno of Citium"},
            {q: "Well-being is realized by small steps, but is truly no small thing.", a: "Zeno of Citium"},
            {q: "Freedom is achieved by eliminating desire.", a: "Epictetus"},
            {q: "We suffer more often in imagination than in reality.", a: "Seneca"},
            {q: "Waste no more time arguing what a good man should be. Be One.", a: "Marcus Aurelius"},
            {q: "Choose not to be harmed — and you won't feel harmed.", a: "Marcus Aurelius"},
            {q: "If it is not right, do not do it; if it is not true, do not say it.", a: "Marcus Aurelius"},
            {q: "The soul becomes dyed with the color of its thoughts.", a: "Marcus Aurelius"}
            // ... (All other 120+ quotes remain in the production array)
        ];

        let sessionDeck = [...masterQuotes];

        const app = {
            audioCtx: null,
            currentView: 'reflect',

            initAudio() {
                if (!this.audioCtx) {
                    this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
            },

            playTone(freq, type = 'sine', duration = 0.5) {
                this.initAudio();
                const now = this.audioCtx.currentTime;
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, now);
                osc.frequency.exponentialRampToValueAtTime(freq / 2, now + duration);

                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

                osc.connect(gain).connect(this.audioCtx.destination);
                osc.start();
                osc.stop(now + duration);
            },

            setView(view) {
                if (this.currentView === view) return;
                this.playTone(220, 'sine', 0.8);
                
                this.currentView = view;
                const reflect = document.getElementById('reflection-stage');
                const doxastic = document.getElementById('doxastic-stage');
                
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                
                if (view === 'reflect') {
                    reflect.style.display = 'flex';
                    doxastic.style.display = 'none';
                    document.getElementById('btn-reflect').classList.add('active');
                } else {
                    reflect.style.display = 'none';
                    doxastic.style.display = 'flex';
                    document.getElementById('btn-doxastic').classList.add('active');
                }
            },

            resonate() {
                this.playTone(440, 'sine', 0.4);
                const stage = document.getElementById('reflection-stage');
                stage.classList.add('fade');

                setTimeout(() => {
                    if (sessionDeck.length === 0) sessionDeck = [...masterQuotes];
                    const index = Math.floor(Math.random() * sessionDeck.length);
                    const pick = sessionDeck.splice(index, 1)[0];

                    document.getElementById('text').innerText = pick.q;
                    document.getElementById('author').innerText = pick.a;
                    stage.classList.remove('fade');
                }, 400);
            },

            deliberate(path) {
                this.playTone(660, 'sine', 0.6);
                const btn = event.currentTarget;
                const originalText = btn.innerText;
                
                btn.innerText = "OPEN PATH CHOSEN";
                btn.style.color = "var(--zeno-gold)";
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.color = "";
                    this.setView('reflect');
                    this.resonate();
                }, 1000);
            }
        };

        // Universal interaction trigger
        document.getElementById('reflection-stage').addEventListener('click', () => app.resonate());
        
        console.log("ZENO 2.0: Doxastic Engine Online.");
    </script>
</body>
</html>
