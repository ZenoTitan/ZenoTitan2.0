<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENOTITAN | 120 Reflections</title>
    <style>
        :root {
            --gold: #FFD700;
            --gloss-gold: linear-gradient(180deg, #FFF5C3 0%, #FFD700 50%, #B8860B 100%);
            --silver: #E0E0E0;
            --purple: #8A2BE2;
            --obsidian: #030303;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--obsidian);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        /* Metallic Liquid Border */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            padding: 5px;
            background: linear-gradient(90deg, var(--gold), var(--purple), var(--silver), var(--gold));
            background-size: 400% 400%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            animation: flowBorder 6s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes flowBorder {
            0% { background-position: 0% 50%; }
            100% { background-position: 400% 50%; }
        }

        .container {
            text-align: center;
            max-width: 900px;
            padding: 40px;
            z-index: 10;
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.01); }
        }

        h1 {
            font-size: clamp(3rem, 15vw, 6rem);
            font-weight: 900;
            letter-spacing: 1.5rem;
            background: var(--gloss-gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.4));
            margin-bottom: 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: var(--silver);
            text-transform: uppercase;
            margin-bottom: 50px;
            font-weight: bold;
            opacity: 0.8;
        }

        #reflection-display {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #quote {
            font-size: 2.2rem;
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 30px;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        #philosopher {
            font-size: 1.2rem;
            letter-spacing: 8px;
            color: var(--gold);
            font-weight: 900;
            text-transform: uppercase;
        }

        #source {
            font-size: 0.8rem;
            color: var(--purple);
            margin-top: 15px;
            font-weight: bold;
        }

        .hint {
            position: fixed;
            bottom: 30px;
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: #444;
            text-transform: uppercase;
        }

        .updating {
            opacity: 0;
            transform: scale(0.9) translateY(20px);
            filter: brightness(3) blur(5px);
        }
    </style>
</head>
