<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENO | Neural Citadel</title>
    <style>
        :root {
            --bg: #040504;
            --sage: #86a695;
            --deep: #111814;
            --gold: #b3965d;
            --mist: #d1d9d5;
            --transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* RESET & CORE */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background-color: var(--bg);
            color: var(--mist);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 110%, var(--deep) 0%, var(--bg) 100%);
        }

        /* THE FRAME - Set to pointer-events: none so it NEVER blocks a click */
        body::after {
            content: ""; position: absolute; inset: 0;
            border: 1px solid rgba(134, 166, 149, 0.1);
            pointer-events: none; z-index: 9999;
        }

        header { padding: 3rem 1rem 1rem; text-align: center; pointer-events: none; }
        h1 { 
            font-family: 'Times New Roman', serif; font-size: clamp(2.5rem, 12vw, 5rem); 
            letter-spacing: 1.5rem; color: var(--sage); font-weight: 200;
            margin-bottom: 0.5rem; padding-left: 1.5rem;
        }
        .version-tag { font-size: 0.5rem; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; opacity: 0.6; }

        main { flex-grow: 1; position: relative; width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; display: flex; align-items: center; justify-content: center; }

        /* VIEW STATES */
        .view { display: none; width: 100%; flex-direction: column; animation: viewFade 0.6s ease forwards; }
        .view.active { display: flex; }
        @keyframes viewFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* REFLECTION UI */
        #quote-container { text-align: center; cursor: pointer; padding: 2rem; border-radius: 4px; transition: var(--transition); }
        #quote-text { font-size: clamp(1.2rem, 4vw, 2rem); line-height: 1.6; font-weight: 300; font-style: italic; margin-bottom: 2rem; }
        #quote-author { font-size: 0.7rem; letter-spacing: 6px; color: var(--gold); text-transform: uppercase; }

        /* COUNSELOR CHAT */
        #chat-scroller { height: 350px; overflow-y: auto; padding-right: 15px; display: flex; flex-direction: column; gap: 1.2rem; scrollbar-width: none; }
        #chat-scroller::-webkit-scrollbar { display: none; }
        .bubble { padding: 1.2rem; border-radius: 2px; font-size: 0.95rem; line-height: 1.7; max-width: 85%; transition: var(--transition); }
        .bubble.ai { background: rgba(134, 166, 149, 0.05); color: var(--sage); border-left: 2px solid var(--sage); align-self: flex-start; }
        .bubble.user { background: rgba(179, 150, 93, 0.05); color: var(--mist); border-right: 2px solid var(--gold); align-self: flex-end; text-align: right; }

        .input-box { margin-top: 1.5rem; border-bottom: 1px solid var(--deep); padding: 10px 0; display: flex; }
        input { background: transparent; border: none; outline: none; color: var(--mist); width: 100%; font-size: 1.1rem; font-weight: 300; }

        /* DOXASTIC OPTIONS */
        .delib-header { text-align: center; font-size: 0.7rem; color: var(--sage); letter-spacing: 4px; margin-bottom: 2rem; text-transform: uppercase; }
        .path-btn { 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(134, 166, 149, 0.1);
            color: var(--mist); padding: 1.8rem; margin-bottom: 1rem; cursor: pointer;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 3px; text-align: center; transition: var(--transition);
        }
        .path-btn:hover { border-color: var(--gold); background: rgba(179, 150, 93, 0.05); }

        /* NAVIGATION BAR */
        nav { padding: 2rem; display: flex; justify-content: center; gap: 3rem; z-index: 10000; position: relative; }
        .nav-link { 
            font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--mist); 
            opacity: 0.4; cursor: pointer; transition: 0.3s; padding: 10px;
        }
        .nav-link.active { opacity: 1; color: var(--sage); border-bottom: 1px solid var(--sage); }
    </style>
</head>
<body>

<header>
    <h1>ZENO</h1>
    <div class="version-tag">Doxastic Agent v8.0</div>
</header>

<main>
    <div id="view-reflect" class="view active">
        <div id="quote-container">
            <p id="quote-text">The citadel is silent. Tap to evoke a fragment.</p>
            <p id="quote-author">INITIATE</p>
        </div>
    </div>

    <div id="view-ai" class="view">
        <div id="chat-scroller">
            <div class="bubble ai">I have observed your presence. What impression currently tests your reason?</div>
        </div>
        <div class="input-box">
            <input type="text" id="chat-input" placeholder="Speak to Zeno..." autocomplete="off">
        </div>
    </div>

    <div id="view-delib" class="view">
        <p class="delib-header">Deliberation: Open Paths</p>
        <div class="path-btn" data-path="Amor Fati">Path of Acceptance</div>
        <div class="path-btn" data-path="Virtue">Path of Immediate Action</div>
        <div class="path-btn" data-path="Suspension">Path of Doxastic Restraint</div>
    </div>
</main>

<nav id="main-nav">
    <div class="nav-link active" data-v="reflect">Citadel</div>
    <div class="nav-link" data-v="ai">Counselor</div>
    <div class="nav-link" data-v="delib">Deliberate</div>
</nav>

<script>
// EXHAUSTIVE QUOTE LIBRARY
const LIBRARY = [
    {q: "Better to trip with the feet than with the tongue.", a: "Zeno of Citium"},
    {q: "We suffer more often in imagination than in reality.", a: "Seneca"},
    {q: "The soul becomes dyed with the color of its thoughts.", a: "Marcus Aurelius"},
    {q: "Waste no more time arguing what a good man should be. Be one.", a: "Marcus Aurelius"},
    {q: "If it is not right, do not do it; if it is not true, do not say it.", a: "Marcus Aurelius"},
    {q: "He who fears death will never do anything worthy of a living man.", a: "Seneca"},
    {q: "No man is free who is not master of himself.", a: "Epictetus"},
    {q: "The best revenge is not to be like your enemy.", a: "Marcus Aurelius"},
    {q: "Everything we hear is an opinion, not a fact.", a: "Marcus Aurelius"},
    {q: "Very little is needed to make a happy life.", a: "Marcus Aurelius"}
];

const app = {
    audio: null,
    seen: new Set(JSON.parse(localStorage.getItem('zeno_seen') || '[]')),
    history: [],

    init() {
        // Use Global Event Delegation to ensure buttons ALWAYS work
        document.addEventListener('click', (e) => {
            const navLink = e.target.closest('.nav-link');
            const quoteBox = e.target.closest('#quote-container');
            const pathBtn = e.target.closest('.path-btn');

            if (navLink) this.switchView(navLink.dataset.v, navLink);
            if (quoteBox) this.nextQuote();
            if (pathBtn) this.handleDeliberation(pathBtn.dataset.path);
        });

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') this.handleChat(e.target.value);
        });

        console.log("ZENO 8.0: Logic Engine Online.");
    },

    playBell(freq) {
        if (!this.audio) this.audio = new (window.AudioContext || window.webkitAudioContext)();
        if (this.audio.state === 'suspended') this.audio.resume();
        const osc = this.audio.createOscillator();
        const gain = this.audio.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, this.audio.currentTime);
        gain.gain.setValueAtTime(0.04, this.audio.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, this.audio.currentTime + 1);
        osc.connect(gain).connect(this.audio.destination);
        osc.start(); osc.stop(this.audio.currentTime + 1);
    },

    switchView(viewId, target) {
        this.playBell(150);
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        document.getElementById(`view-${viewId}`).classList.add('active');
        target.classList.add('active');
    },

    nextQuote() {
        this.playBell(240);
        let pool = LIBRARY.filter(i => !this.seen.has(i.q));
        if (pool.length === 0) { this.seen.clear(); pool = LIBRARY; }

        const pick = pool[Math.floor(Math.random() * pool.length)];
        this.seen.add(pick.q);
        localStorage.setItem('zeno_seen', JSON.stringify([...this.seen]));

        const textEl = document.getElementById('quote-text');
        textEl.style.opacity = 0;
        setTimeout(() => {
            textEl.innerText = pick.q;
            document.getElementById('quote-author').innerText = pick.a;
            textEl.style.opacity = 1;
        }, 300);
    },

    handleChat(input) {
        if (!input.trim()) return;
        this.addBubble('user', input);
        document.getElementById('chat-input').value = '';
        this.playBell(300);

        setTimeout(() => {
            const reply = this.vectorAI(input);
            this.addBubble('ai', reply);
            this.history.push({u: input, ai: reply});
        }, 800);
    },

    vectorAI(input) {
        const text = input.toLowerCase();
        // Weighted Logic-Gates (Neural Simulation)
        if (text.includes("work") || text.includes("money") || text.includes("boss")) {
            return "Labor is a service to the human hive. But your tranquility is not for sale. If you lose your job today, does your virtue remain? If yes, then you have lost nothing of value.";
        }
        if (text.includes("people") || text.includes("said") || text.includes("them")) {
            return "You are seeking validation in the minds of others—minds that are as unstable as yours. Return to your own judgment. Their praise is noise; your character is music.";
        }
        if (text.includes("fear") || text.includes("future") || text.includes("what if")) {
            return "You are suffering from ghosts. According to Tomis Kapitan, deliberation requires that you see the future as open. If it is open, why have you already decided it will be bad?";
        }
        if (this.history.length > 2) {
            return "We have been speaking for a while. Notice how each 'problem' you bring is actually just a new mask for the same desire to control the uncontrollable.";
        }
        return "Is this thought concerning a thing within your power? If not, cast it out. It is an indifferent. Describe only the facts, stripped of your emotional adjectives.";
    },

    addBubble(role, text) {
        const scroller = document.getElementById('chat-scroller');
        const b = document.createElement('div');
        b.className = `bubble ${role}`;
        b.innerText = text;
        scroller.appendChild(b);
        scroller.scrollTo({ top: scroller.scrollHeight, behavior: 'smooth' });
    },

    handleDeliberation(path) {
        this.playBell(440);
        this.switchView('ai', document.querySelector('[data-v="ai"]'));
        this.addBubble('ai', `Doxastic Freedom exercised. You have identified the Path of ${path} as causally open. Deliberation has ended; action begins. How does this resolve your current impression?`);
    }
};

// Initialize after DOM is fully ready
window.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
