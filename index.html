<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenoTitan 2.0 | Compendium of Clarity</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@200;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --white: #ffffff;
            --bg: #020202;
            --glass: rgba(12, 12, 12, 0.75);
            --glow: rgba(197, 160, 89, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow-x: hidden;
        }

        /* Ambient Dynamic Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 35%, #1a1a1a 0%, #020202 100%);
            z-index: -1;
        }

        /* 1. THE GLIMMER TITLE - FIXED TOP */
        .header-container {
            margin-top: 6vh;
            text-align: center;
            z-index: 100;
        }

        .glimmer-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 10vw, 5.8rem);
            letter-spacing: 22px;
            margin: 0;
            background: linear-gradient(90deg, #111, #fff, var(--gold), #fff, #111);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 8s linear infinite, float 6s ease-in-out infinite;
            filter: drop-shadow(0 0 20px var(--glow));
        }

        @keyframes shine { to { background-position: 200% center; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .subtitle {
            color: var(--gold);
