<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENO | Stoic Counselor</title>
    <style>
        :root {
            --bg: #080a09;
            --sage: #7a9d8a;
            --forest: #1b2621;
            --mist: #e8edea;
            --accent: #c5a059;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body {
            background-color: var(--bg);
            color: var(--mist);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .app-shell {
            width: 90%;
            max-width: 700px;
            height: 85vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Fixed Branding */
        header { text-align: center; margin-bottom: 2rem; }
        h1 { 
            font-family: 'Times New Roman', serif; 
            font-size: 3rem; 
            letter-spacing: 1rem; 
            color: var(--sage);
            font-weight: 200;
        }

        /* Unified Stage View */
        .stage-container {
            flex-grow: 1;
            position: relative;
            overflow-y: auto;
            padding: 20px;
            scrollbar-width: none;
        }
        .stage-container::-webkit-scrollbar { display: none; }

        .view { display: none; flex-direction: column; animation: fadeIn 0.8s ease forwards; }
        .view.active { display: flex; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* The Counselor Chat UI */
        .chat-log { display: flex; flex-direction: column; gap: 1.5rem; margin-bottom: 2rem; }
        .msg { max-width: 85%; line-height: 1.6; font-size: 0.95rem; padding: 1rem; border-radius: 4px; }
        .msg.ai { align-self: flex-start; color: var(--sage); border-left: 1px solid var(--sage); background: rgba(122, 157, 138, 0.03); }
        .msg.user { align-self: flex-end; color: var(--mist); text-align: right; border-right: 1px solid var(--accent); background: rgba(197, 160, 89, 0.03); }

        .input-area {
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 20px;
        }
        input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--mist);
            font-size: 1rem;
            outline: none;
            border-bottom: 1px solid var(--forest);
        }
        input:focus { border-color: var(--sage); }

        /* Global Navigation (The "Bottom Bar") */
        nav {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 30px 0;
        }
        .nav-btn {
            background: none; border: none;
            color: var(--mist); opacity: 0.4;
            font-size: 0.7rem; letter-spacing: 3px;
            cursor: pointer; transition: var(--transition);
            text-transform: uppercase;
        }
        .nav-btn.active { opacity: 1; color: var(--sage); border-bottom: 1px solid var(--sage); }

        /* Quote Stage */
        #quote-display { font-size: 1.8rem; font-style: italic; font-weight: 300; text-align: center; }
        #quote-author { margin-top: 1rem; color: var(--accent); letter-spacing: 4px; font-size: 0.7rem; text-align: center; }

    </style>
</head>
<body>

    <div class="app-shell">
        <header><h1>ZENO</h1></header>

        <div class="stage-container">
            <div id="view-reflect" class="view active">
                <div id="quote-trigger" style="cursor: pointer; height: 300px; display: flex; flex-direction: column; justify-content: center;">
                    <p id="quote-display">Tap to summon the Citadel.</p>
                    <p id="quote-author">INITIATE SESSION</p>
                </div>
            </div>

            <div id="view-ai" class="view">
                <div class="chat-log" id="chat-log">
                    <div class="msg ai">I have observed your presence. What impression is currently testing your reason?</div>
                </div>
                <div class="input-area">
                    <input type="text" id="ai-input" placeholder="Speak, I am listening..." autocomplete="off">
                </div>
            </div>

            <div id="view-doxastic" class="view">
                <p style="text-align: center; color: var(--sage); margin-bottom: 2rem;">DOXASTIC FREEDOM: SELECT A CAUSALLY OPEN PATH</p>
                <div class="msg ai" style="margin-bottom: 1rem; cursor: pointer;" onclick="app.choosePath('AMOR FATI')">PATH A: Loving the necessity of what happened.</div>
                <div class="msg ai" style="cursor: pointer;" onclick="app.choosePath('VOLITION')">PATH B: Exercising will over what remains.</div>
            </div>
        </div>

        <nav>
            <button class="nav-btn active" onclick="app.switchView('reflect', this)">Reflect</button>
            <button class="nav-btn" onclick="app.switchView('ai', this)">Counsellor</button>
            <button class="nav-btn" onclick="app.switchView('doxastic', this)">Deliberate</button>
        </nav>
    </div>

    <script>
        // Memory System
        const memory = {
            history: JSON.parse(localStorage.getItem('zeno_history')) || [],
            quotesSeen: new Set(JSON.parse(localStorage.getItem('zeno_quotes')) || []),
            save() {
                localStorage.setItem('zeno_history', JSON.stringify(this.history));
                localStorage.setItem('zeno_quotes', JSON.stringify([...this.quotesSeen]));
            }
        };

        const library = [
            {q: "We suffer more often in imagination than in reality.", a: "Seneca"},
            {q: "The soul becomes dyed with the color of its thoughts.", a: "Marcus Aurelius"},
            {q: "It is not what happens to you, but how you react to it.", a: "Epictetus"},
            {q: "He who fears death will never do anything worthy of a living man.", a: "Seneca"},
            {q: "Waste no more time arguing what a good man should be. Be one.", a: "Marcus Aurelius"}
            // Add your full 120+ list here
        ];

        const app = {
            audioCtx: null,
            
            init() {
                this.setupListeners();
                this.renderHistory();
            },

            setupListeners() {
                document.getElementById('quote-trigger').onclick = () => this.nextQuote();
                document.getElementById('ai-input').onkeypress = (e) => {
                    if (e.key === 'Enter') this.askAI(e.target.value);
                };
            },

            playTone(freq) {
                if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 1);
                osc.connect(gain).connect(this.audioCtx.destination);
                osc.start(); osc.stop(this.audioCtx.currentTime + 1);
            },

            switchView(viewId, btn) {
                this.playTone(150);
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.getElementById(`view-${viewId}`).classList.add('active');
                btn.classList.add('active');
            },

            nextQuote() {
                this.playTone(300);
                const available = library.filter(item => !memory.quotesSeen.has(item.q));
                const pool = available.length > 0 ? available : library;
                
                if (available.length === 0) memory.quotesSeen.clear();

                const pick = pool[Math.floor(Math.random() * pool.length)];
                memory.quotesSeen.add(pick.q);
                memory.save();

                document.getElementById('quote-display').innerText = pick.q;
                document.getElementById('quote-author').innerText = pick.a;
            },

            // THE INTELLIGENCE ENGINE
            async askAI(input) {
                if (!input.trim()) return;
                this.playTone(400);
                this.addMessage('user', input);
                document.getElementById('ai-input').value = '';

                // Simulation of deep Stoic processing
                setTimeout(() => {
                    const response = this.generateStoicResponse(input);
                    this.addMessage('ai', response);
                    memory.history.push({u: input, ai: response});
                    memory.save();
                }, 1000);
            },
