<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Orbitron:wght@400;900&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gloss: linear-gradient(135deg, #fbf5b7 0%, #d4af37 25%, #fbf5b7 50%, #d4af37 75%, #fbf5b7 100%);
            --gold-text: #d4af37;
            --bg: #050505;
            --panel: #0a0a0a;
        }

        body {
            margin: 0; background: var(--bg); color: var(--gold-text);
            font-family: 'Space Mono', monospace; display: flex; flex-direction: column; align-items: center;
        }

        /* High-Gloss Header */
        header {
            width: 100%; padding: 40px 0; text-align: center; background: #000;
            border-bottom: 2px solid var(--gold-text); box-shadow: 0 0 20px rgba(212,175,55,0.3);
        }

        .glimmer {
            font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900;
            background: var(--gold-gloss); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 5s linear infinite; letter-spacing: 15px; margin: 0;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .container {
            max-width: 1000px; width: 90%; margin: 40px auto;
            background: var(--panel); border: 1px solid var(--gold-text);
            padding: 40px; box-shadow: 0 0 50px #000; border-radius: 4px;
        }

        /* The Gold Bullion Buttons */
        .btn-gold {
            background: var(--gold-gloss); color: #000; border: none;
            padding: 20px; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; width: 100%; letter-spacing: 3px; margin: 10px 0;
            text-transform: uppercase; transition: 0.3s; border-radius: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.8);
        }
        .btn-gold:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(212,175,55,0.5); }

        textarea, input {
            width: 100%; background: #000; border: 1px solid #333;
            color: #fff; padding: 20px; font-family: 'Space Mono'; font-size: 1.1rem;
            margin: 15px 0; box-sizing: border-box; outline: none; border-radius: 2px;
        }
        textarea:focus, input:focus { border-color: var(--gold-text); }

        /* Output Cards */
        #output { display: none; margin-top: 40px; border-top: 1px solid #222; padding-top: 40px; }
        .quote { font-family: 'Cinzel'; font-size: 2.2rem; color: #fff; line-height: 1.3; margin-bottom: 30px; border-left: 5px solid var(--gold-text); padding-left: 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: #000; border: 1px solid #222; padding: 20px; border-radius: 2px; }
        .card b { color: var(--gold-text); font-family: 'Orbitron'; font-size: 0.7rem; display: block; margin-bottom: 10px; }
        .card p { font-size: 0.9rem; line-height: 1.6; color: #bbb; margin: 0; }

        .hidden { display: none; }
    </style>
</head>

    </div>
</div>
