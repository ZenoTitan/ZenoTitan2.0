<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENOTITAN | The Complete Compendium</title>
    <style>
        :root {
            --gold: #FFD700;
            --gloss: linear-gradient(180deg, #FFFFFF 0%, #FFD700 50%, #B8860B 100%);
            --purple: #BC13FE;
            --black: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--black);
            color: #fff;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        /* Metallic Frame */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            border: 4px solid transparent;
            background: linear-gradient(90deg, var(--gold), var(--purple), #fff, var(--gold)) border-box;
            background-size: 400% center;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: flow 6s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes flow { to { background-position: 400% center; } }

        .container {
            text-align: center;
            width: 90%;
            max-width: 900px;
            z-index: 10;
            pointer-events: none;
            /* Subtle breathing animation */
            animation: breathe 8s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Times New Roman', Times, serif;
            font-size: clamp(2.2rem, 12vw, 6.5rem);
            font-weight: 200;
            letter-spacing: 1.2rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            background: var(--gloss);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.7));
            white-space: nowrap;
            padding-right: 1.2rem; /* Titan fix for clipping */
        }

        .subtitle {
            font-size: clamp(0.6rem, 2vw, 0.8rem);
            letter-spacing: 5px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 4rem;
            font-weight: 900;
        }

        #reflection-stage {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #text {
            font-size: clamp(1.3rem, 4vw, 2.3rem);
            line-height: 1.2;
            font-weight: 800;
            margin-bottom: 2rem;
            color: #fff;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        #author {
            font-size: 1.1rem;
            letter-spacing: 7px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
        }

        #source {
            font-size: 0.75rem;
            color: var(--purple);
            margin-top: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .fade { opacity: 0; transform: scale(0.98); }

        @media (max-width: 600px) {
            h1 { letter-spacing: 0.5rem; padding-right: 0.5rem; }
            .container { width: 88%; }
        }
    </style>
</head>
<body>

        </div>

        let sessionDeck = [...masterQuotes];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound() {
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(1600, now);
            osc1.frequency.exponentialRampToValueAtTime(350, now + 0.15);
            gain1.gain.setValueAtTime(0.4, now);
            gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            osc1.connect(gain1).connect(audioCtx.destination);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(60, now);
            gain2.gain.setValueAtTime(0.3, now);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
            osc2.connect(gain2).connect(audioCtx.destination);

            osc1.start(); osc2.start();
            osc1.stop(now + 0.4); osc2.stop(now + 0.6);
        }

        function resonate() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playSound();

            const box = document.getElementById('reflection-stage');
            box.classList.add('fade');

            setTimeout(() => {
                if (sessionDeck.length === 0) {
                    console.log("Full Compendium Cycled. Shuffling Fragments.");
                    sessionDeck = [...masterQuotes];
                }

                // Random selection + PERMANENT DELETE FROM SESSION (Zero Repeats)
                const index = Math.floor(Math.random() * sessionDeck.length);
                const pick = sessionDeck.splice(index, 1)[0]; 

                document.getElementById('text').innerText = pick.q;
                document.getElementById('author').innerText = pick.a;
                document.getElementById('source').innerText = pick.s;

                // Sub-aura background shifts (Obsidian Focus)
                const pulses = ['#1a0022', '#1a1400', '#001a1a', '#000000'];
                document.body.style.backgroundColor = pulses[Math.floor(Math.random()*pulses.length)];

                box.classList.remove('fade');
            }, 300);
        }

        // UNIVERSAL LISTENER: App Store Ready click engine
        document.addEventListener('click', resonate);
        document.addEventListener('touchstart', (e) => {
            // Prevent double triggers on mobile
            e.preventDefault();
            resonate();
        });

        console.log("Zenotitan 6.0 Online. Fragments Loaded:", masterQuotes.length);
    </script>
</body>
</html>
