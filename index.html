<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENO TITAN | THE SOVEREIGN V12</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gloss: linear-gradient(135deg, #fbf5b7 0%, #d4af37 25%, #fbf5b7 50%, #d4af37 75%, #fbf5b7 100%);
            --gold-text: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --bg: #050505;
            --glass: rgba(15, 15, 15, 0.95);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: var(--gold-text);
            font-family: 'Montserrat', sans-serif; overflow-x: hidden; scroll-behavior: smooth;
        }

        /* Ambient Glossy Background */
        .ambient-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #050505 100%);
            z-index: -1;
        }

        .header {
            padding: 40px; text-align: center; border-bottom: 2px solid var(--gold-text);
            background: rgba(0,0,0,0.9); box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .glimmer-title {
            font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 900;
            background: var(--gold-gloss); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 5s linear infinite; letter-spacing: 15px; margin: 0;
            filter: drop-shadow(0 0 10px var(--gold-glow));
        }
        @keyframes shine { to { background-position: 200% center; } }

        .container {
            max-width: 1200px; margin: 40px auto; padding: 20px;
            display: grid; grid-template-columns: 1fr; gap: 30px;
        }

        /* The AI Interface */
        .ai-shell {
            background: var(--glass); border: 1px solid var(--gold-text);
            padding: 40px; border-radius: 4px; position: relative;
            box-shadow: 0 0 50px #000, inset 0 0 20px rgba(212, 175, 55, 0.05);
        }

        .memory-tag {
            font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 3px;
            margin-bottom: 20px; color: #fff; opacity: 0.7; display: block;
        }

        textarea {
            width: 100%; height: 120px; background: #000; border: 1px solid #333;
            color: #fff; padding: 20px; font-family: 'Montserrat'; font-size: 1.1rem;
            margin-bottom: 20px; outline: none; transition: 0.3s; box-sizing: border-box;
            border-radius: 4px;
        }
        textarea:focus { border-color: var(--gold-text); box-shadow: 0 0 15px var(--gold-glow); }

        .btn-gold {
            background: var(--gold-gloss); color: #000; border: none;
            padding: 18px 40px; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; width: 100%; letter-spacing: 3px; border-radius: 4px;
            text-transform: uppercase; transition: 0.3s;
        }
        .btn-gold:hover { transform: scale(1.01); box-shadow: 0 0 30px var(--gold-glow); }

        /* Output / Dialogue */
        #response-box { display: none; margin-top: 40px; animation: fadeInUp 0.8s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .quote-display {
            font-family: 'Cinzel'; font-size: 2.2rem; color: #fff; line-height: 1.3;
            margin: 30px 0; padding-left: 20px; border-left: 4px solid var(--gold-text);
        }

        .author-label { font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 5px; color: var(--gold-text); }

        .counsel-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #0c0c0c; border: 1px solid #222; padding: 25px; border-radius: 4px; }
        .card b { font-family: 'Orbitron'; color: var(--gold-text); display: block; margin-bottom: 10px; font-size: 0.7rem; letter-spacing: 2px; }
        .card p { font-size: 0.9rem; line-height: 1.6; color: #bbb; margin: 0; }

        /* Gamification / Progress Bar */
        .progress-bar {
            margin-top: 60px; padding: 20px; border: 1px solid #222; background: #0a0a0a;
            text-align: center; border-radius: 4px;
        }
        .xp-track { width: 100%; height: 5px; background: #222; margin: 15px 0; overflow: hidden; }
        .xp-fill { width: 0%; height: 100%; background: var(--gold-gloss); transition: 1s ease-in-out; }
        .virtue-tag { display: inline-block; padding: 5px 15px; border: 1px solid var(--gold-text); font-size: 0.6rem; margin: 5px; color: #fff; border-radius: 20px; }

        #name-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 2000; display: flex;
            justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body>

<div id="name-modal" style="display:none;">
    <div style="max-width: 400px; padding: 40px; border: 1px solid var(--gold-text); background: #0a0a0a;">
        <h2 style="font-family: 'Cinzel'; color: #fff;">WHO ENTERS THE ARCHIVE?</h2>
        <input type="text" id="user-name-input" placeholder="Enter your name..." style="width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #fff; margin: 20px 0;">
        <button class="btn-gold" onclick="saveName()">BEGIN ASCENSION</button>
    </div>
</div>

<div class="ambient-glow"></div>

<div class="header">
    <h1 class="glimmer-title">ZENO TITAN</h1>
    <div style="font-size: 0.7rem; color: #fff; opacity: 0.5; letter-spacing: 8px; margin-top: 10px;">SOVEREIGNTY_AI v12.0</div>
</div>

<div class="container">
    <div class="ai-shell">
        <span class="memory-tag" id="welcome-msg">INITIALIZING SYSTEM...</span>

        <button class="btn-gold" onclick="consultTitan()">CONSULT THE SOVEREIGN</button>

        <div id="response-box">
            <span class="author-label" id="resAuthor"></span>
            <div class="quote-display" id="resQuote"></div>
            
            <div class="counsel-grid">
                <div class="card">
                    <b>TITAN_INTERPRETATION</b>
                    <p id="resMeaning"></p>
                </div>
                <div class="card">
                    <b>COMFORT_PROTOCOL</b>
                    <p id="resComfort"></p>
                </div>
                <div class="card">
                    <b>CBT_REFRAME</b>
                    <p id="resCBT"></p>
                </div>
                <div class="card">
                    <b>VIRTUE_APPLICATION</b>
                    <p id="resVirtue"></p>
                </div>
            </div>
            
            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="btn-gold" style="font-size: 0.6rem; padding: 12px;" onclick="applyLesson()">APPLY THIS LESSON (+10 XP)</button>
                <button class="btn-gold" style="font-size: 0.6rem; padding: 12px; background: #222; color: #fff;" onclick="location.reload()">REBOOT</button>
            </div>
        </div>
    </div>

    <div class="progress-bar">
        <div style="font-family: 'Orbitron'; font-size: 0.8rem;">SOVEREIGNTY LEVEL: <span id="user-level">1</span></div>
        <div class="xp-track"><div class="xp-fill" id="user-xp"></div></div>
        <div id="virtue-list">
            <span class="virtue-tag">INITIATE</span>
        </div>
    </div>
</div>
