<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenoTitan 2.0 | Digital Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --white: #f5f5f5;
            --bg: #050505;
            --panel: #0a0a0a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start; /* Keeps title at the top */
            overflow: hidden;
        }

        /* Ambient Background Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #111 0%, #050505 100%);
            z-index: -1;
        }

        /* THE GLIMMER TITLE - FIXED AND POPPING */
        .header-container {
            margin-top: 5vh;
            padding: 20px;
            z-index: 100;
            text-align: center;
        }

        .glimmer-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(2.5rem, 10vw, 5.5rem);
            letter-spacing: 18px;
            margin: 0;
            background: linear-gradient(90deg, #111, #fff, var(--gold), #fff, #111);
            background-size: 200% auto;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 6s linear infinite;
            filter: drop-shadow(0 0 15px rgba(197, 160, 89, 0.4));
            cursor: default;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .subtitle {
            color: var(--gold);
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 6px;
            margin-top: 10px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* QUOTE BOX - MOVED LOWER TO PREVENT COVERING TITLE */
        .main-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 90%;
            max-width: 800px;
            padding-bottom: 5vh;
        }

        .quote-card {
            background: var(--panel);
            padding: 50px;
            border: 1px solid rgba(197, 160, 89, 0.1);
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            text-align: center;
            position: relative;
            width: 100%;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: transform 0.3s ease;
        }

        #wisdom-text {
            font-size: 1.5rem;
            line-height: 1.7;
            font-weight: 300;
            margin-bottom: 25px;
            color: #ddd;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #author-name {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        /* BUTTONS AND CONTROLS */
        .controls {
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .seek-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 16px 45px;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
        }

        .seek-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.4);
            transform: translateY(-3px);
        }

        .seek-btn:active { transform: scale(0.95); }

        .counter {
            margin-top: 25px;
            font-size: 0.7rem;
            color: #444;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Animations */
        .fade-out { opacity: 0; transform: translateY(10px); }
        .fade-in { opacity: 1 !important; }

    </style>
</head>

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playStoicTone() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Randomized pitch for variety (between 200Hz and 600Hz)
            const randomFrequency = Math.random() * (600 - 200) + 200;
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(randomFrequency, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(randomFrequency / 2, audioCtx.currentTime + 1);
            
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1);
        }

        let pool = [...database];
        let viewedCount = 0;

        function generateWisdom() {
            playStoicTone();
            
            const textEl = document.getElementById('wisdom-text');
            const authorEl = document.getElementById('author-name');
            const countEl = document.getElementById('counter');

            if (pool.length === 0) pool = [...database];

            const index = Math.floor(Math.random() * pool.length);
            const quote = pool[index];
            pool.splice(index, 1); 
            viewedCount++;

            // Transition logic
            textEl.classList.add('fade-out');
            authorEl.classList.remove('fade-in');
            
            setTimeout(() => {
                textEl.innerText = `"${quote}"`;
                textEl.classList.remove('fade-out');
                authorEl.classList.add('fade-in');
                countEl.innerText = `Insight ${viewedCount} / 200`;
            }, 550);
        }
