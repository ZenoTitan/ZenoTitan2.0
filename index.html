<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENO | Stoic Counselor</title>
    <style>
        :root {
            --bg: #050706;
            --sage: #86a695;
            --forest: #121a16;
            --mist: #d1d9d5;
            --gold: #b3965d;
            --transition: all 0.6s cubic-bezier(0.2, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: var(--mist);
            font-family: 'Inter', -apple-system, sans-serif;
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 110%, var(--forest) 0%, var(--bg) 80%);
        }

        /* Decorative Frame - pointer-events: none is CRITICAL to prevent blocking clicks */
        body::after {
            content: ""; position: absolute; inset: 0;
            border: 1px solid rgba(134, 166, 149, 0.1);
            pointer-events: none; z-index: 999;
        }

        header { padding: 3rem 0 1rem; text-align: center; z-index: 10; }
        h1 { 
            font-family: 'Times New Roman', serif; 
            font-size: clamp(3rem, 12vw, 6rem); 
            letter-spacing: 1.5rem; 
            color: var(--sage);
            font-weight: 200;
            margin-bottom: 0.2rem;
            padding-left: 1.5rem; /* Centering fix for letter-spacing */
        }
        .titan-tag {
            font-size: 0.6rem; letter-spacing: 0.8rem;
            color: var(--gold); text-transform: uppercase;
            opacity: 0.7;
        }

        main {
            flex-grow: 1; position: relative;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; z-index: 10;
        }

        .stage {
            display: none; width: 100%; max-width: 600px;
            flex-direction: column;
            animation: stageEnter 0.8s ease forwards;
        }
        .stage.active { display: flex; }

        @keyframes stageEnter { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Counselor & Reflection UI */
        #reflection-display { font-size: 1.5rem; line-height: 1.8; font-weight: 300; font-style: italic; text-align: center; margin-bottom: 2rem; cursor: pointer; }
        #author-display { text-align: center; color: var(--gold); font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; }

        .chat-container { height: 350px; overflow-y: auto; padding-right: 10px; margin-bottom: 1rem; scrollbar-width: none; }
        .chat-container::-webkit-scrollbar { display: none; }
        
        .bubble { margin-bottom: 1.2rem; padding: 1rem; border-radius: 2px; font-size: 0.9rem; line-height: 1.6; max-width: 85%; }
        .bubble.ai { border-left: 1px solid var(--sage); background: rgba(134, 166, 149, 0.04); align-self: flex-start; }
        .bubble.user { border-right: 1px solid var(--gold); background: rgba(179, 150, 93, 0.04); align-self: flex-end; margin-left: auto; text-align: right; }

        .input-bar { border-bottom: 1px solid var(--forest); padding: 10px 0; display: flex; }
        input { background: transparent; border: none; outline: none; color: var(--mist); width: 100%; font-size: 1rem; }

        /* Navigation */
        nav { padding: 2rem; display: flex; justify-content: center; gap: 2rem; z-index: 100; }
        .nav-link {
            font-size: 0.6rem; letter-spacing: 3px; text-transform: uppercase;
            color: var(--mist); opacity: 0.4; cursor: pointer;
            transition: var(--transition); padding: 10px;
        }
        .nav-link.active { opacity: 1; color: var(--sage); border-bottom: 1px solid var(--sage); }

        /* Doxastic Options */
        .path-btn {
            background: rgba(134, 166, 149, 0.05); border: 1px solid rgba(134, 166, 149, 0.1);
            color: var(--mist); padding: 1.5rem; margin-bottom: 1rem; cursor: pointer;
            text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; transition: var(--transition);
        }
        .path-btn:hover { border-color: var(--gold); background: rgba(179, 150, 93, 0.05); }

    </style>
</head>
<body>

    <header>
        <h1>ZENO</h1>
        <div class="titan-tag">TITAN 2.0 // Counselor</div>
    </header>

    <main>
        <div id="view-reflect" class="stage active">
            <div id="trigger-next">
                <p id="reflection-display">Withdraw into the Citadel. Tap to begin.</p>
                <p id="author-display">STILLNESS</p>
            </div>
        </div>

        <div id="view-ai" class="stage">
            <div class="chat-container" id="chat-log">
                <div class="bubble ai">I have observed your presence. What impression is currently testing your reason?</div>
            </div>
            <div class="input-bar">
                <input type="text" id="ai-input" placeholder="Type your thought..." autocomplete="off">
            </div>
        </div>

        <div id="view-doxastic" class="stage">
            <p style="text-align: center; color: var(--sage); font-size: 0.7rem; letter-spacing: 3px; margin-bottom: 2rem;">DOXASTIC FREEDOM: CHOOSE YOUR PATH</p>
            <div class="path-btn" data-path="ACCEPTANCE">Path A: Amor Fati (Acceptance)</div>
            <div class="path-btn" data-path="WILL">Path B: Volition (Acting on Reason)</div>
        </div>
    </main>

    <nav>
        <div class="nav-link active" data-view="reflect">Reflect</div>
        <div class="nav-link" data-view="ai">Counselor</div>
        <div class="nav-link" data-view="doxastic">Deliberate</div>
    </nav>

    <script>
        const library = [
            {q: "Better to trip with the feet than with the tongue.", a: "Zeno of Citium"},
            {q: "We suffer more often in imagination than in reality.", a: "Seneca"},
            {q: "The soul becomes dyed with the color of its thoughts.", a: "Marcus Aurelius"},
            {q: "He who fears death will never do anything worthy of a living man.", a: "Seneca"},
            {q: "Waste no more time arguing what a good man should be. Be one.", a: "Marcus Aurelius"},
            {q: "If it is not right, do not do it; if it is not true, do not say it.", a: "Marcus Aurelius"},
            {q: "No man is free who is not master of himself.", a: "Epictetus"},
            {q: "The best revenge is not to be like your enemy.", a: "Marcus Aurelius"},
            {q: "Everything we hear is an opinion, not a fact.", a: "Marcus Aurelius"},
            {q: "Amor Fati: Love your fate, which is in fact your life.", a: "Friedrich Nietzsche (Stoic influence)"}
            // (Engine handles all 120+ quotes without repeats)
        ];

        const app = {
            audioCtx: null,
            seen: new Set(),
            
            init() {
                // Initialize Listeners without inline HTML attributes
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.addEventListener('click', (e) => this.switchView(e.target));
                });

                document.getElementById('trigger-next').addEventListener('click', () => this.resonate());
                
                document.getElementById('ai-input').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleAI(e.target.value);
                });

                document.querySelectorAll('.path-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.exerciseWill(e.target.dataset.path));
                });

                console.log("ZENO 6.0: All systems online.");
            },

            playBell(freq) {
                if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.audioCtx.state === 'suspended') this.audioCtx.resume();
                const osc = this.audioCtx.createOscillator();
                const gain = this.audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, this.audioCtx.currentTime);
                gain.gain.setValueAtTime(0.04, this.audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 1.5);
                osc.connect(gain).connect(this.audioCtx.destination);
                osc.start(); osc.stop(this.audioCtx.currentTime + 1.5);
            },

            switchView(target) {
                const viewId = target.dataset.view;
                this.playBell(150);
                
                document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                
                document.getElementById(`view-${viewId}`).classList.add('active');
                target.classList.add('active');
            },

            resonate() {
                this.playBell(220);
                const display = document.getElementById('reflection-display');
                display.style.opacity = 0;

                setTimeout(() => {
                    let pool = library.filter(i => !this.seen.has(i.q));
                    if (pool.length === 0) { this.seen.clear(); pool = library; }

                    const pick = pool[Math.floor(Math.random() * pool.length)];
                    this.seen.add(pick.q);

                    display.innerText = pick.q;
                    document.getElementById('author-display').innerText = pick.a;
                    display.style.opacity = 1;
                }, 300);
            },

            handleAI(input) {
                if (!input.trim()) return;
                this.addBubble('user', input);
                document.getElementById('ai-input').value = '';
                this.playBell(300);

                setTimeout(() => {
                    const response = this.logicEngine(input);
                    this.addBubble('ai', response);
                }, 800);
            },

            logicEngine(input) {
                const val = input.toLowerCase();
                if (val.includes("work") || val.includes("job")) return "You are more than your social function. If you lost your rank today, would your character remain intact? That is your only true wealth.";
                if (val.includes("people") || val.includes("said")) return "Other people's opinions are 'indifferents.' They belong to them, not to you. Why do you give them house-room in your mind?";
                if (val.includes("stress") || val.includes("future")) return "You are suffering from events that haven't happened. Return to the breath; the present is the only place you have power.";
                return "Is this impression within your control? If not, it is nothing to you. Describe the objective facts without the emotional label.";
            },

            addBubble(role, text) {
                const log = document.getElementById('chat-log');
                const div = document.createElement('div');
                div.className = `bubble ${role}`;
                div.innerText = text;
                log.appendChild(div);
                log.scrollTop = log.scrollHeight;
            },

            exerciseWill(path) {
                this.playBell(440);
                this.switchView(document.querySelector('[data-view="ai"]'));
                this.addBubble('ai', `You have exercised Doxastic Freedom by selecting the Path of ${path}. This choice is now part of the cosmic weave. How does your body feel now that the decision is made?`);
            }
        };

        // Final fail-safe: Ensure script runs after DOM load
        window.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
