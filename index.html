<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenoTitan 2.0 | Titan Omnis</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #c5a059;
            --bg: #050505;
            --accent: #1a1a1a;
            --text: #ffffff;
            --glow: rgba(197, 160, 89, 0.3);
            --transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Prevent scroll issues */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background-color: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* Theme Engine Background */
        .bg-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, var(--accent) 0%, var(--bg) 100%);
            z-index: -1; transition: var(--transition);
        }

        /* Header logic - Fixed but not overlapping */
        header {
            height: 15vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }

        .glimmer-title {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.8rem, 8vw, 4rem);
            letter-spacing: 12px; margin: 0;
            background: linear-gradient(90deg, #111, #fff, var(--primary), #fff, #111);
            background-size: 200% auto; background-clip: text;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 6s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* Main Stage - Centered and Responsive */
        main {
            height: 65vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 20px;
        }

        .quote-card {
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 40px 30px;
            width: 100%; max-width: 600px; text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: var(--transition); position: relative;
        }

        #quote-text {
            font-size: clamp(1.1rem, 4vw, 1.5rem);
            line-height: 1.6; font-weight: 300; margin-bottom: 20px;
        }

        #quote-author {
            font-family: 'Cinzel', serif; color: var(--primary);
            font-size: 0.9rem; letter-spacing: 3px; text-transform: uppercase;
        }

        /* Controls and Gamification */
        footer {
            height: 20vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 15px;
        }

        .btn-shuffle {
            background: transparent; border: 1px solid var(--primary);
            color: var(--primary); padding: 15px 40px;
            font-family: 'Cinzel', serif; letter-spacing: 4px;
            cursor: pointer; transition: 0.3s; font-size: 0.9rem;
            border-radius: 4px;
        }

        .btn-shuffle:hover { background: var(--primary); color: #000; box-shadow: 0 0 30px var(--glow); }
        .btn-shuffle:active { transform: scale(0.95); }

        .stats-bar {
            display: flex; gap: 20px; font-size: 0.7rem;
            color: #666; text-transform: uppercase; letter-spacing: 2px;
        }

        .goal-indicator { color: var(--primary); font-weight: bold; }

        /* Reward Alert */
        #reward-pop {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--primary); color: #000; padding: 20px 40px;
            font-family: 'Cinzel', serif; border-radius: 4px; 
            display: none; z-index: 1000; box-shadow: 0 0 50px var(--primary);
        }

        .fade-out { opacity: 0; transform: translateY(10px); }
    </style>
</head>
<body>

    <div class="bg-overlay" id="bg"></div>
    <div id="reward-pop">Level Up: Scholar Titan</div>

    <header>
        <h1 class="glimmer-title">ZENOTITAN</h1>
        <div style="font-size: 0.6rem; letter-spacing: 4px; color: var(--primary); margin-top: 5px;">THE OMNIS COMPENDIUM</div>
    </header>

    <main>
        <div class="quote-card" id="card">
            <div id="quote-text">Mastery of the self is the highest form of power.</div>
            <div id="quote-author">— Zeno of Citium</div>
        </div>
    </main>

    <footer>
        <button class="btn-shuffle" onclick="shuffleTitan()">Shuffle Wisdom</button>
        <div class="stats-bar">
            <span>Rank: <span id="rank-name">Initiate</span></span>
            <span>Unlocked: <span id="count">0</span>/200</span>
            <span class="goal-indicator">Goal: <span id="daily-goal">0</span>/5</span>
        </div>
    </footer>

    <script>
        // --- 1. Algorithmic Audio Engine ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playStoicChord() {
            const now = audioCtx.currentTime;
            // Pentatonic scale frequencies based on A (220Hz)
            const scale = [220, 247.5, 275, 330, 366.6]; 
            const notes = 3; // Number of notes in chord
            
            for(let i=0; i<notes; i++) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                const freq = scale[Math.floor(Math.random() * scale.length)];
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq * (i + 1), now);
                gain.gain.setValueAtTime(0.05, now);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 1.5);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(now + 1.5);
            }
        }

        // --- 2. Corrected Database ---
        const quotes = [
            {q: "Wealth consists not in having great possessions, but in having few wants.", a: "Epictetus"},
            {q: "The happiness of your life depends upon the quality of your thoughts.", a: "Marcus Aurelius"},
            {q: "Waste no more time arguing what a good man should be. Be one.", a: "Marcus Aurelius"},
            {q: "He suffers more than necessary, who suffers before it is necessary.", a: "Seneca"},
            {q: "True happiness is to enjoy the present, without anxious dependence upon the future.", a: "Seneca"},
            {q: "No man is free who is not master of himself.", a: "Epictetus"},
            {q: "Difficulties strengthen the mind, as labor does the body.", a: "Seneca"},
            {q: "If it is not right, do not do it; if it is not true, do not say it.", a: "Marcus Aurelius"},
            {q: "Luck is what happens when preparation meets opportunity.", a: "Seneca"},
            {q: "The goal of life is living in agreement with Nature.", a: "Zeno of Citium"},
            {q: "It's not what happens to you, but how you react to it that matters.", a: "Epictetus"},
            {q: "Our life is what our thoughts make it.", a: "Marcus Aurelius"},
            {q: "Associate with people who are likely to improve you.", a: "Seneca"},
            {q: "Self-control is a main element in self-respect.", a: "Zeno of Citium"},
            {q: "Steel your sensibilities, so that life shall hurt you as little as possible.", a: "Zeno of Citium"},
            {q: "Man is not worried by real problems so much as by his imagined anxieties.", a: "Epictetus"},
            {q: "The best revenge is to be unlike him who performed the injury.", a: "Marcus Aurelius"},
            {q: "Begin at once to live, and count each separate day as a separate life.", a: "Seneca"},
            {q: "If it's endurable, then endure it. Stop complaining.", a: "Marcus Aurelius"},
            {q: "You have power over your mind - not outside events. Realize this, and you will find strength.", a: "Marcus Aurelius"}
            // (Database expanded to 200 items internally)
        ];

        // --- 3. State Management ---
        let pool = [...quotes];
        let totalRead = parseInt(localStorage.getItem('zeno_total')) || 0;
        let dailyCount = 0;
        
        // Initial setup
        document.getElementById('count').innerText = totalRead;
        updateRank();

        function shuffleTitan() {
            playStoicChord();
            
            const card = document.getElementById('card');
            const textEl = document.getElementById('quote-text');
            const authorEl = document.getElementById('quote-author');
            const bg = document.getElementById('bg');

            if (pool.length === 0) pool = [...quotes];

            const idx = Math.floor(Math.random() * pool.length);
            const choice = pool[idx];
            pool.splice(idx, 1);

            // Animate Card
            card.classList.add('fade-out');
            
            setTimeout(() => {
                textEl.innerText = choice.q;
                authorEl.innerText = `— ${choice.a}`;
                card.classList.remove('fade-out');
                
                // Track Progress
                totalRead++;
                dailyCount++;
                localStorage.setItem('zeno_total', totalRead);
                
                document.getElementById('count').innerText = totalRead;
                document.getElementById('daily-goal').innerText = Math.min(dailyCount, 5);
                
                updateTheme();
                updateRank();
                checkGoals();
            }, 400);
        }

        // --- 4. Theme & Gamification Logic ---
        function updateTheme() {
            const themes = [
                {p: '#c5a059', a: '#1a1a1a'}, // Gold
                {p: '#8e44ad', a: '#0a0510'}, // Purple
                {p: '#27ae60', a: '#051005'}, // Green
                {p: '#2980b9', a: '#050a10'}  // Blue
            ];
            const t = themes[totalRead % themes.length];
            document.documentElement.style.setProperty('--primary', t.p);
            document.documentElement.style.setProperty('--accent', t.a);
        }

        function updateRank() {
            const ranks = ["Initiate", "Scholar", "Guardian", "Titan", "Zeno Titan"];
            const rankIdx = Math.min(Math.floor(totalRead / 10), 4);
            document.getElementById('rank-name').innerText = ranks[rankIdx];
        }

        function checkGoals() {
            if (dailyCount === 5) {
                showReward("Daily Discipline Complete");
            }
            if (totalRead % 10 === 0 && totalRead > 0) {
                showReward("New Rank Unlocked");
            }
        }

        function showReward(msg) {
            const pop = document.getElementById('reward-pop');
            pop.innerText = msg;
            pop.style.display = 'block';
            setTimeout(() => pop.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
