<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENO TITAN | COLOSSUS v14</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold-gloss: linear-gradient(135deg, #cfc09f 0%, #634f2c 25%, #cfc09f 50%, #f3e5ab 75%, #cfc09f 100%);
            --gold-glow: rgba(212, 175, 55, 0.4);
            --gold-text: #d4af37;
            --bg: #030303;
            --obsidian: rgba(12, 12, 12, 0.98);
        }

        body, html {
            margin: 0; padding: 0; background: var(--bg); color: var(--gold-text);
            font-family: 'Space Mono', monospace; overflow-x: hidden; scroll-behavior: smooth;
        }

        /* The Breathing Sanctuary */
        .sanctuary-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111 0%, #030303 100%);
            z-index: -1; animation: breathe 10s ease-in-out infinite;
        }
        @keyframes breathe { 0%, 100% { opacity: 0.7; transform: scale(1); } 50% { opacity: 1; transform: scale(1.03); } }

        /* Liquid Gold Header */
        .header {
            padding: 30px; text-align: center; border-bottom: 2px solid var(--gold-text);
            background: #000; box-shadow: 0 5px 30px rgba(0,0,0,1); sticky; top: 0; z-index: 1000;
        }

        .glimmer {
            font-family: 'Cinzel', serif; font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 900;
            background: var(--gold-gloss); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 6s linear infinite; letter-spacing: 12px; margin: 0;
            filter: drop-shadow(0 0 10px var(--gold-glow));
        }
        @keyframes shine { to { background-position: 200% center; } }

        .dashboard {
            max-width: 1400px; margin: 40px auto; padding: 20px;
            display: grid; grid-template-columns: 340px 1fr; gap: 40px;
        }

        /* Sidebar Navigation */
        .sidebar {
            background: var(--obsidian); border: 1px solid rgba(212,175,55,0.3);
            padding: 30px; border-radius: 4px; height: fit-content; position: sticky; top: 150px;
        }

        .btn-gold {
            background: var(--gold-gloss); color: #000; border: none;
            padding: 18px; font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer; width: 100%; letter-spacing: 3px; margin-bottom: 15px;
            text-transform: uppercase; transition: 0.4s; border-radius: 2px;
            box-shadow: 0 4px 10px #000;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 30px var(--gold-glow); }

        /* Main Dialogue Engine */
        .main-stage {
            background: var(--obsidian); border: 1px solid rgba(212,175,55,0.3);
            padding: 50px; border-radius: 4px; box-shadow: 0 0 60px #000; min-height: 800px;
        }

        textarea {
            width: 100%; height: 140px; background: #000; border: 1px solid #222;
            color: #fff; padding: 25px; font-family: 'Space Mono'; font-size: 1.1rem;
            margin: 20px 0; outline: none; transition: 0.3s; box-sizing: border-box;
        }
        textarea:focus { border-color: var(--gold-text); box-shadow: 0 0 20px rgba(212,175,55,0.1); }

        /* Logic Output */
        .output-zone { display: none; animation: slideUp 1s ease; margin-top: 50px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .quote-panel {
            font-family: 'Cinzel'; font-size: 2.3rem; color: #fff; line-height: 1.3;
            margin: 30px 0; border-left: 6px solid var(--gold-text); padding-left: 30px;
        }

        .logic-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 25px; margin-top: 40px; }
        .card { background: #080808; border: 1px solid #1a1a1a; padding: 30px; position: relative; }
        .card b { font-family: 'Orbitron'; color: var(--gold-text); font-size: 0.75rem; letter-spacing: 2px; display: block; margin-bottom: 12px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .card p { font-size: 0.95rem; line-height: 1.8; color: #aaa; margin: 0; }

        /* Progress System */
        .progress-tray { margin-top: 40px; padding: 25px; border-top: 1px solid #222; text-align: left; }
        .xp-bar { width: 100%; height: 4px; background: #111; margin: 15px 0; overflow: hidden; }
        .xp-fill { width: 0%; height: 100%; background: var(--gold-gloss); transition: 1.5s ease; }

        /* Overlay */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 9999; display: flex;
            justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
