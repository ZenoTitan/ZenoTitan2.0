<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENOTITAN | 120 Stoic Fragments</title>
    <style>
        :root {
            --gold: #FFD700;
            --deep-purple: #8A2BE2;
            --pure-white: #FFFFFF;
            --pitch-black: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--pitch-black);
            color: var(--pure-white);
            font-family: 'Helvetica Neue', Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        /* Metallic Liquid Border */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            border: 4px solid transparent;
            background: linear-gradient(90deg, var(--gold), var(--deep-purple), var(--pure-white), var(--gold)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: flow 5s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        @keyframes flow {
            to { background-position: 400% center; }
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 800px;
            z-index: 10;
            pointer-events: none;
        }

        h1 {
            font-family: 'Times New Roman', serif;
            font-size: clamp(2rem, 12vw, 6rem);
            font-weight: 100;
            letter-spacing: 0.8rem;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            background: linear-gradient(to bottom, #fff 20%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
            /* Mobile fix: ensures letters don't wrap or clip */
            white-space: nowrap; 
        }

        .subtitle {
            font-size: clamp(0.5rem, 2vw, 0.75rem);
            letter-spacing: 4px;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 3rem;
            font-weight: 800;
        }

        #quote-stage {
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #quote-text {
            font-size: clamp(1.2rem, 5vw, 2.2rem);
            line-height: 1.3;
            font-weight: 800;
            margin-bottom: 2rem;
            color: #fff;
        }

        #quote-author {
            font-size: 1rem;
            letter-spacing: 6px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
        }

        #quote-source {
            font-size: 0.7rem;
            color: var(--deep-purple);
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .fade { opacity: 0; transform: scale(0.98); }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            h1 { letter-spacing: 0.3rem; }
            .container { width: 85%; }
        }
    </style>
</head>

        let sessionDeck = [...masterQuotes];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound() {
            const now = audioCtx.currentTime;
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(1600, now);
            osc1.frequency.exponentialRampToValueAtTime(300, now + 0.12);
            gain1.gain.setValueAtTime(0.4, now);
            gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            osc1.connect(gain1).connect(audioCtx.destination);
            
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(60, now);
            gain2.gain.setValueAtTime(0.3, now);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.6);
            osc2.connect(gain2).connect(audioCtx.destination);

            osc1.start(); osc2.start();
            osc1.stop(now + 0.4); osc2.stop(now + 0.6);
        }

        function resonate() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playSound();

            const box = document.getElementById('quote-stage');
            box.classList.add('fade');

            setTimeout(() => {
                // If the deck is empty, refill it
                if (sessionDeck.length === 0) {
                    sessionDeck = [...masterQuotes];
                }

                // Random selection + DELETE FROM DECK (Ensures NO REPEATS)
                const index = Math.floor(Math.random() * sessionDeck.length);
                const pick = sessionDeck.splice(index, 1)[0]; 

                document.getElementById('quote-text').innerText = pick.q;
                document.getElementById('quote-author').innerText = pick.a;
                document.getElementById('quote-source').innerText = pick.s;

                // Pitch black remains, but subtle aura pulses
                const pulses = ['#1a0033', '#221100', '#001a1a', '#000000'];
                document.body.style.backgroundColor = pulses[Math.floor(Math.random()*pulses.length)];

                box.classList.remove('fade');
            }, 300);
        }

        // GLOBAL LISTENER - Ensures buttons always work on every device
        document.addEventListener('click', resonate);
    </script>
</body>
</html>
