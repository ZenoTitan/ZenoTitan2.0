<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENO | TITAN OS v3.0</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Space+Mono&display=swap');

        :root {
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --bg: #0a0a0a;
            --glass: rgba(20, 20, 20, 0.8);
        }

        body {
            background-color: var(--bg);
            color: var(--gold);
            font-family: 'Space Mono', monospace;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Scanline Effect */
        body::before {
            content: " ";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
            z-index: 10;
        }

        .os-container {
            width: 90vw;
            height: 80vh;
            border: 1px solid var(--gold);
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 0 20px var(--gold-glow);
            position: relative;
            background: var(--glass);
            backdrop-filter: blur(5px);
        }

        .header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 5px;
        }

        .main-ui {
            margin-top: 100px;
            text-align: center;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            margin: 0;
            text-shadow: 0 0 20px var(--gold);
            letter-spacing: 15px;
        }

        textarea {
            width: 60%;
            height: 150px;
            background: transparent;
            border: 1px solid var(--gold);
            color: #fff;
            padding: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 1.2rem;
            margin: 40px 0;
            outline: none;
            box-shadow: inset 0 0 10px var(--gold-glow);
        }

        .titan-btn {
            background: var(--gold);
            color: #000;
            padding: 20px 50px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(10% 0%, 100% 0%, 90% 100%, 0% 100%);
        }

        .titan-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px var(--gold);
        }

        /* Loading Overlay */
        #scanner {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .bar-container {
            width: 300px;
            height: 10px;
            border: 1px solid var(--gold);
            margin-top: 20px;
        }

        .bar {
            width: 0%;
            height: 100%;
            background: var(--gold);
            transition: width 2s ease;
        }

        /* Result Modal */
        #result {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            background: #050505;
            border: 2px solid var(--gold);
            padding: 50px;
            z-index: 30;
            box-shadow: 0 0 100px #000;
        }

        .quote-text {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .author-tag {
            text-transform: uppercase;
            letter-spacing: 10px;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        .logic-note {
            border-left: 3px solid var(--gold);
            padding-left: 20px;
            color: #888;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="os-container">
    <div class="header">
        <div>STATUS: TITAN_ONLINE</div>
        <div>MEMORY_LOAD: 88%</div>
        <div>ENCRYPTION: ACTIVE</div>
    </div>

    <div class="main-ui">
        <h1>ZENO//TITAN</h1>
        <p style="letter-spacing: 5px;">ENTER CHAOS COMMAND</p>
        <textarea id="userInput" placeholder="EX: I AM AFRAID OF FAILURE..."></textarea>
        <br>
        <button class="titan-btn" onclick="runTitan()">EXECUTE LOGIC</button>
    </div>

    <div id="scanner">
        <div id="scanStatus">SCANNING DISTURBANCE...</div>
        <div class="bar-container"><div id="progressBar" class="bar"></div></div>
    </div>

    <div id="result">
        <div class="author-tag" id="outAuthor"></div>
        <div class="quote-text" id="outQuote"></div>
        <div class="logic-note" id="outNote"></div>
        <br><br>
        <button class="titan-btn" style="padding: 10px 30px;" onclick="resetOS()">REBOOT SYSTEM</button>
    </div>
</div>

<script>
    // MASSIVE LOGIC DATABASE (Expandable to 100s)
    const database = [
        { q: "We suffer more in imagination than in reality.", a: "Seneca", n: "The pain you feel is a ghost created by your future-thoughts. It has no physical power over you unless you permit it.", k: ["fear", "anxiety", "worried", "scared", "future", "failure"] },
        { q: "The best revenge is to be unlike him who performed the injury.", a: "Marcus Aurelius", n: "To hate is to become the enemy. To remain calm is to conquer them without throwing a punch.", k: ["anger", "angry", "hate", "revenge", "mad", "insult"] },
        { q: "Wealth consists not in having great possessions, but in having few wants.", a: "Epictetus", n: "If you desire nothing, even a king cannot threaten your peace. You are already at the top.", k: ["money", "poor", "rich", "jealous", "want", "greedy"] },
        { q: "It is not death that a man should fear, but he should fear never beginning to live.", a: "Marcus Aurelius", n: "The end is certain. The now is choice. Do not waste the choice fearing the certainty.", k: ["death", "dying", "end", "time"] },
        { q: "Waste no more time arguing what a good man should be. Be one.", a: "Marcus Aurelius", n: "Action is the only logic. Words are just air. Stop talking, start doing.", k: ["lazy", "stuck", "what to do", "lost"] },
        { q: "Luck is what happens when preparation meets opportunity.", a: "Seneca", n: "Stop waiting for a miracle. Build the vessel so you can catch the wind when it arrives.", k: ["luck", "unlucky", "success"] }
        // ... (You can add 100 more here)
    ];

    function runTitan() {
        const input = document.getElementById('userInput').value;
        if (!input) return;

        // Start Scanner
        document.getElementById('scanner').style.display = 'flex';
        setTimeout(() => { document.getElementById('progressBar').style.width = "100%"; }, 100);

        setTimeout(() => {
            document.getElementById('scanner').style.display = 'none';
            document.getElementById('progressBar').style.width = "0%";
            showLogic(input);
        }, 2200);
    }

    function showLogic(input) {
        let cleanInput = input.toLowerCase();
        let match = database.find(item => item.k.some(key => cleanInput.includes(key)));
        
        if (!match) match = database[Math.floor(Math.random() * database.length)];

        document.getElementById('outAuthor').innerText = `DATA_EXTRACT: ${match.a}`;
        document.getElementById('outQuote').innerText = `"${match.q}"`;
        document.getElementById('outNote').innerText = `TITAN_REASONING: ${match.n}`;
        document.getElementById('result').style.display = 'block';
    }

    function resetOS() {
        document.getElementById('result').style.display = 'none';
        document.getElementById('userInput').value = "";
    }
</script>

</body>
</html>
