<!DOCTYPE html>
<html>
<head>
    <title>ZENO TITAN v2.2</title>
    <style>
        body { background: #000; color: #d4af37; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px solid #d4af37; padding: 40px; border-radius: 20px; max-width: 600px; margin: auto; }
        textarea { width: 90%; padding: 15px; margin: 20px 0; background: #111; color: #fff; border: 1px solid #444; border-radius: 10px; }
        button { background: #d4af37; color: #000; padding: 15px 30px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; }
        .modal-inner { border: 1px solid #d4af37; padding: 40px; background: #050505; border-radius: 20px; max-width: 500px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>ZENO | TITAN</h1>
        <p>SUBMIT YOUR DISTURBANCE</p>
        <textarea id="input" placeholder="Type here..."></textarea>
        <br>
        <button onclick="startLogic()">Submit to Reason</button>
    </div>
    <div id="modal">
        <div class="modal-inner">
            <h2 id="q"></h2>
            <p id="a" style="letter-spacing: 5px;"></p>
            <hr style="border: 0.5px solid #222;">
            <p id="n" style="color: #888; font-style: italic;"></p>
            <button onclick="closeMe()">Return</button>
        </div>
    </div>
    <script>
        const quotes = [
            { q: "We suffer more in imagination than in reality.", a: "SENECA", n: "Fear is a ghost. Stop feeding it.", k: ["fear", "worry", "anxious"] },
            { q: "The best revenge is to be unlike him who caused the injury.", a: "MARCUS AURELIUS", n: "Don't let them turn you into them.", k: ["angry", "hate", "mad"] },
            { q: "You have power over your mind - not outside events.", a: "MARCUS AURELIUS", n: "Focus on what you can control.", k: ["control", "stress"] }
        ];
        function startLogic() {
            const text = document.getElementById('input').value.toLowerCase();
            let found = quotes.find(item => item.k.some(key => text.includes(key)));
            if (!found) found = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('q').innerText = `"${found.q}"`;
            document.getElementById('a').innerText = found.a;
            document.getElementById('n').innerText = found.n;
            document.getElementById('modal').style.display = 'flex';
        }
        function closeMe() {
            document.getElementById('modal').style.display = 'none';
            document.getElementById('input').value = "";
        }
    </script>
</body>
</html>
