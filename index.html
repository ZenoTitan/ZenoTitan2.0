<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENO | TITAN v6.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cinzel:wght@400;900&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-glow: #fcf6ba;
            --bg: #020202;
            --glass: rgba(10, 10, 10, 0.9);
            --accent: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--gold);
            font-family: 'Space Mono', monospace;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Particle Background Canvas */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            filter: blur(1px);
        }

        .os-shell {
            max-width: 1200px;
            margin: 40px auto;
            border: 1px solid var(--gold);
            background: var(--glass);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 100px rgba(0,0,0,1), inset 0 0 20px rgba(212,175,55,0.05);
            padding: 40px;
            position: relative;
            min-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        /* High-End Glimmer Title */
        .glimmer-header {
            font-family: 'Cinzel', serif;
            font-size: 5rem;
            text-align: center;
            background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% auto;
            animation: shine 6s linear infinite;
            letter-spacing: 25px;
            margin: 0;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* Memento Mori Clock */
        .memento-clock {
            text-align: right;
            font-size: 0.7rem;
            letter-spacing: 3px;
            border-bottom: 1px solid var(--accent);
            padding-bottom: 10px;
            margin-bottom: 30px;
            color: #555;
        }

        /* Layout */
        .grid-layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
        }

        /* Interaction Zone */
        .main-deck {
            border-right: 1px solid var(--accent);
            padding-right: 30px;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            padding: 20px;
            font-family: 'Space Mono';
            font-size: 1.1rem;
            margin: 20px 0;
            outline: none;
            transition: 0.3s;
        }
