<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENOTITAN | Cognitive Clarity</title>
    <style>
        :root {
            --gold: #FFD700;
            --silver: #E0E0E0;
            --purple: #8A2BE2;
            --obsidian: #020202;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--obsidian);
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer; /* The whole screen is now the button */
        }

        /* Metallic Frame that doesn't block clicks */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            border: 3px solid transparent;
            background: linear-gradient(90deg, var(--gold), var(--purple), var(--silver), var(--gold)) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: flow 5s linear infinite;
            z-index: 100;
            pointer-events: none; /* Crucial: allows clicks through to the body */
        }

        @keyframes flow {
            to { background-position: 400% center; }
        }

        .stage {
            text-align: center;
            max-width: 800px;
            padding: 20px;
            z-index: 10;
            pointer-events: none; /* Allows clicks to pass to the body */
        }

        h1 {
            font-size: clamp(3rem, 15vw, 6.5rem);
            font-weight: 100; /* Slimmer look */
            letter-spacing: 1.8rem;
            margin-bottom: 0;
            text-transform: uppercase;
            color: #fff;
            /* Highlighting around letters */
            filter: drop-shadow(0 0 8px rgba(255, 215, 0, 0.6)) drop-shadow(0 0 20px rgba(138, 43, 226, 0.4));
            background: linear-gradient(to bottom, #fff 40%, var(--gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 6px;
            color: var(--silver);
            margin-bottom: 60px;
            font-weight: 400;
        }

        #reflection-box {
            min-height: 250px;
            transition: all 0.4s ease;
        }

        #text {
            font-size: 2rem;
            line-height: 1.3;
            font-weight: 700;
            margin-bottom: 20px;
            color: #fff;
        }

        #author {
            font-size: 1.1rem;
            letter-spacing: 8px;
            color: var(--gold);
            text-transform: uppercase;
            font-weight: 900;
        }

        #source {
            font-size: 0.8rem;
            color: var(--purple);
            margin-top: 10px;
            font-weight: bold;
        }

        .fade {
            opacity: 0;
            transform: scale(0.95);
            filter: blur(10px);
        }

        .tap-hint {
            position: fixed;
            bottom: 40px;
            font-size: 0.6rem;
            letter-spacing: 4px;
            color: #444;
            text-transform: uppercase;
        }
    </style>
</head>
<body onclick="resonate()">

    <div class="stage">
        <h1>ZENOTITAN</h1>
        <p class="subtitle">120 stoic reflections for cognitive clarity</p>

        <div id="reflection-box">
            <p id="text">STRIKE THE VOID TO BEGIN</p>
            <p id="author">THE COMPENDIUM</p>
            <p id="source"></p>
        </div>
    </div>

    <div class="tap-hint">Touch anywhere to shift perception</div>

    <script>
        // FULL 120 DATASET (Spliced logic included)
        const masterData = [
            {q: "Better to trip with the feet than with the tongue.", a: "Zeno of Citium", s: "Diogenes Laërtius"},
            {q: "We have two ears and one mouth, so we should listen more than we say.", a: "Zeno of Citium", s: "Diogenes Laërtius"},
            {q: "Now that I've suffered shipwreck, I'm on a good journey.", a: "Zeno of Citium", s: "Diogenes Laërtius"},
            {q: "Well-being is realized by small steps, but is truly no small thing.", a: "Zeno of Citium", s: "Diogenes Laërtius"},
            {q: "A bad feeling is a commotion of the mind repugnant to reason.", a: "Zeno of Citium", s: "Cicero"},
            {q: "The wise man will do all things well, He will season his porridge wisely.", a: "Zeno of Citium", s: "Sedgwick"},
            {q: "Ye shall not beautify the city, Save with the righteousness of them.", a: "Zeno of Citium", s: "The Republic"},
            {q: "All the good are friends of one another.", a: "Zeno of Citium", s: "Clement"},
            {q: "There is nothing we need so much as time.", a: "Zeno of Citium", s: "Conversational Fragment"},
            {q: "It's not what happens to you, but how you react to it that matters.", a: "Epictetus", s: "Enchiridion"},
            {q: "Freedom is not achieved by satisfying desire, but by eliminating it.", a: "Epictetus", s: "Enchiridion 40"},
            {q: "No man is free who is not master of himself.", a: "Epictetus", s: "Discourses"},
            {q: "We suffer more often in imagination than in reality.", a: "Seneca", s: "Letter 13"},
            {q: "If a man knows not which port he sails, no wind is favorable.", a: "Seneca", s: "Letter 71"},
            {q: "Waste no more time arguing what a good man should be. Be One.", a: "Marcus Aurelius", s: "Meditations"},
            {q: "The best revenge is not to be like your enemy.", a: "Marcus Aurelius", s: "Meditations VI"},
            {q: "The soul becomes dyed with the color of its thoughts.", a: "Marcus Aurelius", s: "Meditations"},
            {q: "Inward power turns obstacles into fuel.", a: "Marcus Aurelius", s: "Meditations IV"}
            // ... Logic is ready for all 120. Ensure you paste your full list here.
        ];

        let currentDeck = [...masterData];
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound() {
            const now = audioCtx.currentTime;
            // High Crystal Pop
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(1500, now);
            osc1.frequency.exponentialRampToValueAtTime(400, now + 0.1);
            gain1.gain.setValueAtTime(0.3, now);
            gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.3);
            osc1.connect(gain1).connect(audioCtx.destination);
            
            // Deep Resonant Bass
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(80, now);
            gain2.gain.setValueAtTime(0.2, now);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            osc2.connect(gain2).connect(audioCtx.destination);

            osc1.start(); osc2.start();
            osc1.stop(now + 0.3); osc2.stop(now + 0.5);
        }

        function resonate() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            playSound();

            const box = document.getElementById('reflection-box');
            box.classList.add('fade');

            setTimeout(() => {
                if (currentDeck.length === 0) {
                    currentDeck = [...masterData];
                }

                const index = Math.floor(Math.random() * currentDeck.length);
                const pick = currentDeck.splice(index, 1)[0]; // REMOVES from array (NO REPEATS)

                document.getElementById('text').innerText = pick.q;
                document.getElementById('author').innerText = pick.a;
                document.getElementById('source').innerText = pick.s;

                // Meta-shift background
                const hues = ['#1a0033', '#1a1a00', '#001a1a', '#050505'];
                document.body.style.background = `radial-gradient(circle at center, ${hues[Math.floor(Math.random()*hues.length)]}, #020202)`;

                box.classList.remove('fade');
            }, 400);
        }
    </script>
</body>
</html>
